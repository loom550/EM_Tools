<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOOMI HR — Document Review</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy:   #1a4e7e;
  --teal:   #2f9879;
  --lime:   #7dbe42;
  --red:    #c0392b;
  --amber:  #E8A317;
  --bg:     #f4f6f9;
  --card:   #ffffff;
  --border: #dde3ec;
  --text:   #1a2640;
  --muted:  #6b7a90;
  --row:    #f0f5ff;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── LOGIN ─────────────────────────────────────────────── */
#loginScreen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #0f2d4f 0%, #1a4e7e 50%, #1e6b5a 100%);
}

.login-box {
  background: white;
  border-radius: 12px;
  padding: 48px 40px;
  width: 360px;
  box-shadow: 0 24px 60px rgba(0,0,0,0.25);
}

.login-logo {
  width: 48px;
  height: 48px;
  background: var(--navy);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 600;
  color: white;
  font-size: 20px;
  margin-bottom: 20px;
}

.login-title {
  font-size: 22px;
  font-weight: 600;
  color: var(--navy);
  margin-bottom: 4px;
}

.login-sub {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 32px;
}

.login-box input[type="password"] {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  font-size: 15px;
  font-family: 'IBM Plex Sans', sans-serif;
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 12px;
}

.login-box input[type="password"]:focus { border-color: var(--navy); }

.login-btn {
  width: 100%;
  padding: 12px;
  background: var(--navy);
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 15px;
  font-weight: 600;
  font-family: 'IBM Plex Sans', sans-serif;
  cursor: pointer;
  transition: background 0.2s;
}

.login-btn:hover { background: #0f3360; }
.login-btn:disabled { background: var(--muted); cursor: not-allowed; }

.login-error {
  color: var(--red);
  font-size: 13px;
  margin-top: 8px;
  min-height: 18px;
}

/* ── APP SHELL ─────────────────────────────────────────── */
#app { display: none; min-height: 100vh; }

.app-header {
  background: var(--navy);
  color: white;
  padding: 0 28px;
  height: 56px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.2);
}

.header-logo {
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 600;
  font-size: 15px;
  background: rgba(255,255,255,0.12);
  padding: 4px 10px;
  border-radius: 5px;
  letter-spacing: 0.5px;
}

.header-title {
  font-size: 14px;
  font-weight: 500;
  opacity: 0.85;
  flex: 1;
}

.header-badge {
  font-size: 11px;
  font-weight: 600;
  background: var(--teal);
  padding: 3px 10px;
  border-radius: 20px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* ── TABS ──────────────────────────────────────────────── */
.tab-bar {
  background: white;
  border-bottom: 2px solid var(--border);
  padding: 0 28px;
  display: flex;
  gap: 0;
}

.tab-btn {
  padding: 14px 20px;
  font-size: 13px;
  font-weight: 600;
  font-family: 'IBM Plex Sans', sans-serif;
  background: none;
  border: none;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  cursor: pointer;
  color: var(--muted);
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.tab-btn.active { color: var(--navy); border-bottom-color: var(--navy); }
.tab-btn:hover:not(.active) { color: var(--text); }

.tab-count {
  font-size: 11px;
  background: var(--amber);
  color: white;
  padding: 1px 7px;
  border-radius: 10px;
  font-weight: 700;
}

.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── LAYOUT ────────────────────────────────────────────── */
.content { padding: 24px 28px; max-width: 1100px; }

/* ── PENDING LIST ──────────────────────────────────────── */
.section-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 14px;
}

.contractor-card {
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  margin-bottom: 10px;
  overflow: hidden;
  transition: box-shadow 0.2s;
}

.contractor-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }

.contractor-card-header {
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  user-select: none;
}

.contractor-card-header:hover { background: var(--row); }

.cid-badge {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  background: var(--navy);
  color: white;
  padding: 3px 8px;
  border-radius: 4px;
  flex-shrink: 0;
}

.contractor-info { flex: 1; }

.contractor-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--navy);
  line-height: 1.2;
}

.contractor-meta {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}

.pending-count {
  font-size: 12px;
  font-weight: 600;
  background: #fff3e0;
  color: #c8810a;
  padding: 4px 10px;
  border-radius: 20px;
  flex-shrink: 0;
}

.chevron {
  color: var(--muted);
  font-size: 14px;
  transition: transform 0.2s;
  flex-shrink: 0;
}

.contractor-card.open .chevron { transform: rotate(90deg); }

.contractor-card-body {
  display: none;
  border-top: 1px solid var(--border);
  padding: 16px 18px;
  background: #fafbfc;
}

.contractor-card.open .contractor-card-body { display: block; }

/* ── UPLOAD RECORD ─────────────────────────────────────── */
.upload-record {
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  margin-bottom: 10px;
  overflow: hidden;
}

.upload-record-header {
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  background: #f0f4ff;
  border-bottom: 1px solid var(--border);
}

.upload-sub-id {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--navy);
  font-weight: 600;
}

.upload-date {
  font-size: 12px;
  color: var(--muted);
  flex: 1;
}

.doc-lines { padding: 10px 14px; }

.doc-line {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid #f0f0f0;
}

.doc-line:last-child { border-bottom: none; }

.doc-label {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  width: 160px;
  flex-shrink: 0;
}

.doc-files { flex: 1; display: flex; flex-wrap: wrap; gap: 6px; }

.doc-file-link {
  font-size: 12px;
  color: var(--navy);
  text-decoration: none;
  background: #e8f0fe;
  padding: 3px 10px;
  border-radius: 4px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  transition: background 0.15s;
}

.doc-file-link:hover { background: #d0e4fe; }

.doc-empty { font-size: 12px; color: #bbb; font-style: italic; }

.approve-row {
  padding: 12px 14px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 10px;
  background: #fafbfc;
}

.notes-text {
  font-size: 12px;
  color: var(--muted);
  font-style: italic;
  flex: 1;
}

.btn {
  padding: 8px 18px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  font-family: 'IBM Plex Sans', sans-serif;
  border: none;
  cursor: pointer;
  transition: all 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.btn-approve {
  background: var(--teal);
  color: white;
}

.btn-approve:hover { background: #217a60; }
.btn-approve:disabled { background: #bbb; cursor: not-allowed; }

.btn-navy {
  background: var(--navy);
  color: white;
}

.btn-navy:hover { background: #0f3360; }
.btn-navy:disabled { background: #bbb; cursor: not-allowed; }

.reviewed-badge {
  font-size: 12px;
  font-weight: 600;
  color: var(--teal);
  display: flex;
  align-items: center;
  gap: 4px;
}

/* ── SEARCH TAB ────────────────────────────────────────── */
.search-wrap {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.search-input {
  flex: 1;
  padding: 11px 14px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  font-family: 'IBM Plex Sans', sans-serif;
  outline: none;
  transition: border-color 0.2s;
}

.search-input:focus { border-color: var(--navy); }

.search-btn {
  padding: 11px 20px;
  background: var(--navy);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  font-family: 'IBM Plex Sans', sans-serif;
  cursor: pointer;
  transition: background 0.2s;
}

.search-btn:hover { background: #0f3360; }

/* ── CONTRACTOR DETAIL ─────────────────────────────────── */
.contractor-detail {
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  margin-bottom: 20px;
  overflow: hidden;
}

.contractor-detail-header {
  padding: 18px 20px;
  background: linear-gradient(135deg, var(--navy) 0%, #1e6b5a 100%);
  color: white;
  display: flex;
  align-items: center;
  gap: 16px;
}

.detail-cid {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  background: rgba(255,255,255,0.18);
  padding: 4px 10px;
  border-radius: 5px;
}

.detail-name {
  font-size: 18px;
  font-weight: 600;
  flex: 1;
}

.detail-email {
  font-size: 12px;
  opacity: 0.75;
}

.status-pill {
  font-size: 11px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.status-active   { background: rgba(125,190,66,0.25); color: #a0e060; }
.status-pending  { background: rgba(232,163,23,0.25); color: #f0c040; }
.status-cleared  { background: rgba(47,152,121,0.25); color: #60e0b0; }
.status-other    { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.7); }

/* ── CHECKBOX OVERVIEW ─────────────────────────────────── */
.received-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  background: #f8fafb;
}

.received-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 500;
  padding: 5px 12px;
  border-radius: 20px;
  background: white;
  border: 1.5px solid var(--border);
}

.received-item.done {
  background: #e8f5ee;
  border-color: #a8d8be;
  color: #1a6640;
}

.received-item.missing {
  color: var(--muted);
}

.received-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

.done .received-dot   { background: var(--teal); }
.missing .received-dot { background: #ccc; }

/* ── ICON UPLOAD GRID ──────────────────────────────────── */
.upload-section {
  padding: 18px 20px;
  border-bottom: 1px solid var(--border);
}

.upload-section-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 14px;
}

.upload-icon-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.upload-tile {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 14px 12px;
  border: 1.5px dashed var(--border);
  border-radius: 10px;
  cursor: pointer;
  width: 100px;
  transition: all 0.18s;
  background: white;
  font-family: 'IBM Plex Sans', sans-serif;
}

.upload-tile:hover {
  border-color: var(--navy);
  background: #f0f4ff;
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(26,78,126,0.12);
}

.upload-tile.crjm-tile:hover {
  border-color: var(--teal);
  background: #edf7f3;
}

.tile-icon { font-size: 24px; }

.tile-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--navy);
  text-align: center;
  line-height: 1.3;
}

.crjm-tile .tile-label { color: var(--teal); }

input[type="file"].hidden-file { display: none; }

/* ── UPLOAD STATUS ─────────────────────────────────────── */
.upload-status {
  font-size: 13px;
  padding: 10px 14px;
  border-radius: 6px;
  margin-top: 10px;
  display: none;
}

.upload-status.success { background: #e8f5ee; color: #1a6640; display: block; }
.upload-status.error   { background: #fce8e8; color: var(--red); display: block; }
.upload-status.loading { background: #f0f4ff; color: var(--navy); display: block; }

/* ── SPINNER ───────────────────────────────────────────── */
.spinner {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid rgba(255,255,255,0.4);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── LOADING / EMPTY STATES ────────────────────────────── */
.state-box {
  text-align: center;
  padding: 48px 20px;
  color: var(--muted);
  font-size: 14px;
}

.state-box .big-icon { font-size: 40px; margin-bottom: 12px; }

/* ── TOAST ─────────────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: 28px;
  right: 28px;
  background: var(--text);
  color: white;
  padding: 12px 20px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  z-index: 9999;
  transition: opacity 0.3s, transform 0.3s;
  opacity: 0;
  transform: translateY(12px);
  pointer-events: none;
}

#toast.show { opacity: 1; transform: translateY(0); }
#toast.success { background: var(--teal); }
#toast.error   { background: var(--red); }

/* ── UPLOAD MODAL ──────────────────────────────────────── */
#uploadModal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}

#uploadModal.open { display: flex; }

.modal-box {
  background: white;
  border-radius: 12px;
  padding: 28px;
  width: 420px;
  box-shadow: 0 24px 60px rgba(0,0,0,0.2);
}

.modal-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 6px;
}

.modal-sub {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 20px;
}

.modal-file-zone {
  border: 2px dashed var(--border);
  border-radius: 8px;
  padding: 28px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 16px;
}

.modal-file-zone:hover { border-color: var(--navy); background: var(--row); }
.modal-file-zone.has-file { border-color: var(--teal); background: #edf7f3; }

.modal-file-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--teal);
  margin-top: 6px;
  word-break: break-all;
}

.modal-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 16px;
}

.btn-cancel {
  background: var(--bg);
  color: var(--muted);
  border: 1.5px solid var(--border);
}

.btn-cancel:hover { background: var(--border); color: var(--text); }

.modal-status {
  font-size: 13px;
  padding: 10px 14px;
  border-radius: 6px;
  margin-bottom: 12px;
  display: none;
}

.modal-status.success { background: #e8f5ee; color: #1a6640; display: block; }
.modal-status.error   { background: #fce8e8; color: var(--red); display: block; }
.modal-status.loading { background: #f0f4ff; color: var(--navy); display: block; }

/* ── SEARCH RESULTS ────────────────────────────────────── */
#searchResults { display: none; }
</style>
</head>
<body>

<!-- ── LOGIN ──────────────────────────────────────────────── -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">L</div>
    <div class="login-title">HR Document Review</div>
    <div class="login-sub">LOOMI — The Loomex Group</div>
    <input type="password" id="passwordInput" placeholder="Enter password" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" id="loginBtn" onclick="login()">Sign In</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ── APP ────────────────────────────────────────────────── -->
<div id="app">
  <div class="app-header">
    <div class="header-logo">LOOMI</div>
    <div class="header-title">HR — Document Review Portal</div>
    <div class="header-badge">HR Access</div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" id="tab-pending" onclick="switchTab('pending')">
      ⏳ Pending Review
      <span class="tab-count" id="pendingCount" style="display:none">0</span>
    </button>
    <button class="tab-btn" id="tab-search" onclick="switchTab('search')">
      🔍 Find Contractor
    </button>
  </div>

  <!-- PENDING TAB -->
  <div class="tab-panel active content" id="panel-pending">
    <div class="section-title">Contractors with unreviewed document submissions</div>
    <div id="pendingList">
      <div class="state-box"><div class="big-icon">⏳</div>Loading...</div>
    </div>
  </div>

  <!-- SEARCH TAB -->
  <div class="tab-panel content" id="panel-search">
    <div class="search-wrap">
      <input class="search-input" id="searchInput" placeholder="Search by name or Contractor ID…"
             onkeydown="if(event.key==='Enter')doSearch()">
      <button class="search-btn" onclick="doSearch()">Search</button>
    </div>
    <div id="searchResults"></div>
  </div>
</div>

<!-- ── UPLOAD MODAL ────────────────────────────────────────── -->
<div id="uploadModal">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle">Upload Document</div>
    <div class="modal-sub" id="modalSub">Select a file to upload to the contractor's SharePoint folder.</div>
    <div class="modal-status" id="modalStatus"></div>
    <div class="modal-file-zone" id="modalFileZone" onclick="document.getElementById('modalFileInput').click()">
      <div style="font-size:28px;margin-bottom:6px;">📎</div>
      <div style="font-size:13px;color:var(--muted);">Click to select file</div>
      <div class="modal-file-name" id="modalFileName"></div>
    </div>
    <input type="file" class="hidden-file" id="modalFileInput" onchange="onModalFileSelected()">
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn btn-navy" id="modalUploadBtn" onclick="doModalUpload()" disabled>Upload</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const WORKER = 'https://loomex-hr.loomex-it.workers.dev';
let sessionToken = null;

// ── AUTH ─────────────────────────────────────────────────────
async function login() {
  const pwd  = document.getElementById('passwordInput').value;
  const btn  = document.getElementById('loginBtn');
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  if (!pwd) { errEl.textContent = 'Please enter a password.'; return; }
  btn.disabled = true; btn.textContent = 'Signing in…';

  try {
    const res  = await fetch(`${WORKER}/hr-auth`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd }),
    });
    const data = await res.json();
    if (!res.ok || !data.token) {
      errEl.textContent = 'Incorrect password.';
      btn.disabled = false; btn.textContent = 'Sign In';
      return;
    }
    sessionToken = data.token;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadPending();
  } catch (e) {
    errEl.textContent = 'Connection error. Try again.';
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

// ── TABS ─────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  document.getElementById(`panel-${tab}`).classList.add('active');
}

// ── PENDING ───────────────────────────────────────────────────
async function loadPending() {
  const el = document.getElementById('pendingList');
  el.innerHTML = '<div class="state-box"><div class="big-icon">⏳</div>Loading…</div>';

  try {
    const res  = await fetch(`${WORKER}/hr-pending?token=${encodeURIComponent(sessionToken)}`);
    const data = await res.json();
    if (!data.success) throw new Error(data.error);

    const groups = data.pending;
    const countEl = document.getElementById('pendingCount');
    if (groups.length === 0) {
      el.innerHTML = '<div class="state-box"><div class="big-icon">✅</div>No pending reviews. You\'re all caught up.</div>';
      countEl.style.display = 'none';
      return;
    }
    countEl.textContent = groups.length;
    countEl.style.display = 'inline';
    el.innerHTML = groups.map(g => renderContractorCard(g)).join('');
  } catch (e) {
    el.innerHTML = `<div class="state-box"><div class="big-icon">⚠️</div>${e.message}</div>`;
  }
}

function renderContractorCard(group) {
  const c = group.contractor || {};
  const uploads = group.uploads || [];
  const submissionWord = uploads.length === 1 ? 'submission' : 'submissions';
  return `
  <div class="contractor-card" id="card-${c.contractorId}">
    <div class="contractor-card-header" onclick="toggleCard('${c.contractorId}')">
      <div class="cid-badge">${c.contractorId || '—'}</div>
      <div class="contractor-info">
        <div class="contractor-name">${c.name || 'Unknown'}</div>
        <div class="contractor-meta">${c.email || ''}</div>
      </div>
      <div class="pending-count">${uploads.length} ${submissionWord}</div>
      <div class="chevron">›</div>
    </div>
    <div class="contractor-card-body">
      ${uploads.map(u => renderUploadRecord(u, c)).join('')}
    </div>
  </div>`;
}

function toggleCard(cid) {
  const card = document.getElementById(`card-${cid}`);
  card.classList.toggle('open');
}

function renderUploadRecord(u, c) {
  const date = u.createdTime ? new Date(u.createdTime).toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';
  const docs = [
    { label: 'Resume',          files: u.resume },
    { label: 'AODA Certificate',files: u.aoda },
    { label: 'MOL H&S Cert',   files: u.molhs },
    { label: 'WHMIS Cert',     files: u.whmis },
    { label: "Driver's License",files: u.driversLicense },
    { label: 'Other',          files: u.other },
  ];

  const hasFiles = docs.some(d => d.files && d.files.length > 0);

  return `
  <div class="upload-record" id="urec-${u.recordId}">
    <div class="upload-record-header">
      <span class="upload-sub-id">Submission #${u.submissionId || u.recordId.slice(-6)}</span>
      <span class="upload-date">${date}</span>
    </div>
    <div class="doc-lines">
      ${docs.map(d => `
        <div class="doc-line">
          <div class="doc-label">${d.label}</div>
          <div class="doc-files">
            ${d.files && d.files.length > 0
              ? d.files.map(f => `<a class="doc-file-link" href="${f.url}" target="_blank">📄 ${f.filename}</a>`).join('')
              : '<span class="doc-empty">Not provided</span>'}
          </div>
        </div>`).join('')}
    </div>
    <div class="approve-row">
      ${u.notes ? `<div class="notes-text">Note: ${u.notes}</div>` : '<div></div>'}
      ${u.reviewed
        ? `<div class="reviewed-badge">✅ Reviewed</div>`
        : hasFiles
          ? `<button class="btn btn-approve" id="appbtn-${u.recordId}"
               onclick="approveRecord('${u.recordId}', '${c.contractorId}', '${c.recordId}', '${escStr(c.name)}')">
               ✓ Mark as Reviewed
             </button>`
          : `<span style="font-size:12px;color:var(--muted);">No files attached</span>`
      }
    </div>
  </div>`;
}

async function approveRecord(recordId, contractorId, contractorRecordId, contractorName) {
  const btn = document.getElementById(`appbtn-${recordId}`);
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Uploading to SharePoint…';

  try {
    const res  = await fetch(`${WORKER}/hr-approve`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        token: sessionToken,
        uploadRecordId:     recordId,
        contractorRecordId: contractorRecordId,
        contractorId:       contractorId,
        contractorName:     contractorName,
      }),
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);

    btn.replaceWith(Object.assign(document.createElement('div'), {
      className: 'reviewed-badge', textContent: '✅ Reviewed',
    }));
    showToast('Files uploaded to SharePoint and checkboxes updated.', 'success');
    refreshPendingCount();
  } catch (e) {
    btn.disabled = false;
    btn.innerHTML = '✓ Mark as Reviewed';
    showToast('Error: ' + e.message, 'error');
  }
}

function refreshPendingCount() {
  const cards = document.querySelectorAll('.contractor-card');
  let count = 0;
  cards.forEach(card => {
    const hasPending = card.querySelector('.btn-approve');
    if (hasPending) count++;
  });
  const countEl = document.getElementById('pendingCount');
  countEl.textContent = count;
  countEl.style.display = count > 0 ? 'inline' : 'none';
}

// ── SEARCH ────────────────────────────────────────────────────
async function doSearch() {
  const q   = document.getElementById('searchInput').value.trim();
  const res_el = document.getElementById('searchResults');
  if (!q) return;

  res_el.style.display = 'block';
  res_el.innerHTML = '<div class="state-box"><div class="big-icon">🔍</div>Searching…</div>';

  try {
    const res  = await fetch(`${WORKER}/hr-contractor?token=${encodeURIComponent(sessionToken)}&q=${encodeURIComponent(q)}`);
    const data = await res.json();
    if (!data.success) throw new Error(data.error);

    if (!data.contractors.length) {
      res_el.innerHTML = '<div class="state-box"><div class="big-icon">🔍</div>No contractors found.</div>';
      return;
    }
    res_el.innerHTML = data.contractors.map(c => renderContractorDetail(c)).join('');
  } catch (e) {
    res_el.innerHTML = `<div class="state-box"><div class="big-icon">⚠️</div>${e.message}</div>`;
  }
}

function renderContractorDetail(c) {
  const statusClass = c.status === 'Active' ? 'status-active'
                    : c.status ? 'status-pending'
                    : 'status-other';

  const crjmClass = c.crjmcStatus === 'Cleared' ? 'status-cleared'
                  : c.crjmcStatus ? 'status-pending'
                  : 'status-other';

  const checksConfig = [
    { key: 'resume',         label: 'Resume' },
    { key: 'aoda',           label: 'AODA' },
    { key: 'molhs',          label: 'MOL H&S' },
    { key: 'whmis',          label: 'WHMIS' },
    { key: 'driversLicense', label: 'Driver\'s Lic.' },
    { key: 'crjm',           label: 'CRJM' },
  ];

  const tilesConfig = [
    { type: 'resume',    icon: '📄', label: 'Resume',    crjm: false },
    { type: 'aoda',      icon: '♿', label: 'AODA Cert', crjm: false },
    { type: 'molhs',     icon: '🦺', label: 'MOL H&S',   crjm: false },
    { type: 'whmis',     icon: '⚗️', label: 'WHMIS Cert',crjm: false },
    { type: 'drivers',   icon: '🪪', label: 'Driver Lic.',crjm: false },
    { type: 'crjm',      icon: '🔍', label: 'CRJM Check',crjm: true  },
    { type: 'other',     icon: '📁', label: 'Other Doc', crjm: false },
  ];

  const tileTypeLabels = {
    resume: 'Resume',
    aoda:   'AODA Certificate',
    molhs:  'MOL H&S Certificate',
    whmis:  'WHMIS Certificate',
    drivers: "Driver's License",
    other:  'Document',
  };

  const uploadsHtml = c.uploads.length
    ? c.uploads.map(u => renderUploadRecord(u, c)).join('')
    : '<div class="state-box" style="padding:24px"><div>No document submissions on file.</div></div>';

  return `
  <div class="contractor-detail">
    <div class="contractor-detail-header">
      <div>
        <div class="detail-cid">${c.contractorId}</div>
        <div class="detail-name">${c.name}</div>
        <div class="detail-email">${c.email}</div>
      </div>
      <div style="margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        <span class="status-pill ${statusClass}">${c.status || 'Unknown'}</span>
        <span class="status-pill ${crjmClass}">CRJM: ${c.crjmcStatus || 'Not initiated'}</span>
      </div>
    </div>

    <div class="received-grid">
      ${checksConfig.map(ch => `
        <div class="received-item ${c.checksReceived[ch.key] ? 'done' : 'missing'}">
          <div class="received-dot"></div>
          ${ch.label}
        </div>`).join('')}
    </div>

    <div class="upload-section">
      <div class="upload-section-title">Upload to Contractor Folder</div>
      <div class="upload-icon-grid">
        ${tilesConfig.map(t => `
          <div class="upload-tile ${t.crjm ? 'crjm-tile' : ''}"
               onclick="openUploadModal('${c.contractorId}','${escStr(c.name)}','${c.recordId}','${t.type}','${escStr(tileTypeLabels[t.type] || t.label)}',${t.crjm})">
            <div class="tile-icon">${t.icon}</div>
            <div class="tile-label">${t.label}</div>
          </div>`).join('')}
      </div>
    </div>

    <div style="padding:16px 20px">
      <div class="section-title" style="margin-bottom:14px">Submission History</div>
      ${uploadsHtml}
    </div>
  </div>`;
}

function escStr(s) {
  return (s || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

// ── MODAL ─────────────────────────────────────────────────────
let modalCtx = {};
let modalFile = null;

function openUploadModal(contractorId, contractorName, contractorRecordId, docType, docLabel, isCrjm) {
  modalCtx = { contractorId, contractorName, contractorRecordId, docType, docLabel, isCrjm };
  modalFile = null;
  document.getElementById('modalTitle').textContent = isCrjm ? '🔍 Upload CRJM Check' : `📄 Upload ${docLabel}`;
  document.getElementById('modalSub').textContent = isCrjm
    ? `Upload the cleared CRJM result for ${contractorName}. The file will be uploaded to their SharePoint folder and their status will be set to Cleared.`
    : `Upload ${docLabel} for ${contractorName}. The file will be saved to their SharePoint folder.`;
  document.getElementById('modalFileName').textContent = '';
  document.getElementById('modalFileZone').classList.remove('has-file');
  document.getElementById('modalFileInput').value = '';
  document.getElementById('modalUploadBtn').disabled = true;
  setModalStatus('', '');
  document.getElementById('uploadModal').classList.add('open');
}

function closeModal() {
  document.getElementById('uploadModal').classList.remove('open');
  modalCtx = {};
  modalFile = null;
}

function onModalFileSelected() {
  const input = document.getElementById('modalFileInput');
  modalFile = input.files[0] || null;
  if (modalFile) {
    document.getElementById('modalFileName').textContent = modalFile.name;
    document.getElementById('modalFileZone').classList.add('has-file');
    document.getElementById('modalUploadBtn').disabled = false;
  }
}

function setModalStatus(msg, type) {
  const el = document.getElementById('modalStatus');
  el.className = `modal-status ${type}`;
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

async function doModalUpload() {
  if (!modalFile) return;
  const btn = document.getElementById('modalUploadBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Uploading…';
  setModalStatus('Uploading file…', 'loading');

  try {
    const b64 = await fileToBase64(modalFile);
    const ext  = modalFile.name.split('.').pop().toLowerCase();

    if (modalCtx.isCrjm) {
      const res  = await fetch(`${WORKER}/hr-crjm-upload`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          token: sessionToken,
          contractorId:       modalCtx.contractorId,
          contractorName:     modalCtx.contractorName,
          contractorRecordId: modalCtx.contractorRecordId,
          fileBase64: b64,
          fileExt:    ext,
        }),
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.error);
      setModalStatus('✅ CRJM file uploaded. Status set to Cleared.', 'success');
      showToast('CRJM uploaded and contractor marked Cleared', 'success');
    } else {
      // Determine a sensible filename
      const labelMap = {
        resume:  `${modalCtx.contractorName} - Resume`,
        aoda:    `${modalCtx.contractorName} - AODA Certificate`,
        molhs:   `${modalCtx.contractorName} - MOL H&S Certificate`,
        whmis:   `${modalCtx.contractorName} - WHMIS Certificate`,
        drivers: `${modalCtx.contractorName} - Drivers License`,
        other:   `${modalCtx.contractorName} - ${modalFile.name}`,
      };
      const baseName = labelMap[modalCtx.docType] || `${modalCtx.contractorName} - ${modalCtx.docLabel}`;
      const fileName = `${baseName}.${ext}`;

      const res  = await fetch(`${WORKER}/hr-file-upload`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          token: sessionToken,
          contractorId:   modalCtx.contractorId,
          contractorName: modalCtx.contractorName,
          fileBase64: b64,
          fileName,
        }),
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.error);
      setModalStatus(`✅ ${fileName} uploaded to SharePoint.`, 'success');
      showToast('File uploaded to SharePoint', 'success');
    }

    btn.innerHTML = '✓ Done';
    // Refresh search results after a moment
    setTimeout(() => { closeModal(); doSearch(); }, 1800);
  } catch (e) {
    setModalStatus('Upload failed: ' + e.message, 'error');
    btn.disabled = false;
    btn.innerHTML = 'Upload';
  }
}

// ── UTILS ─────────────────────────────────────────────────────
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload  = () => resolve(r.result);
    r.onerror = () => reject(new Error('File read failed'));
    r.readAsDataURL(file);
  });
}

function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.className = '', 3500);
}
</script>
