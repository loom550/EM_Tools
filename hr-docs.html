<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOOMI HR — Document Review</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy:   #1a4e7e;
  --teal:   #2f9879;
  --lime:   #7dbe42;
  --red:    #c0392b;
  --amber:  #E8A317;
  --bg:     #f4f6f9;
  --card:   #ffffff;
  --border: #dde3ec;
  --text:   #1a2640;
  --muted:  #6b7a90;
  --row:    #f0f5ff;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── LOGIN ─────────────────────────────────────────────── */
#loginScreen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #0f2d4f 0%, #1a4e7e 50%, #1e6b5a 100%);
}
.login-box { background: white; border-radius: 12px; padding: 48px 40px; width: 360px; box-shadow: 0 24px 60px rgba(0,0,0,0.25); }
.login-logo { width: 48px; height: 48px; background: var(--navy); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'IBM Plex Mono', monospace; font-weight: 600; color: white; font-size: 20px; margin-bottom: 20px; }
.login-title { font-size: 22px; font-weight: 600; color: var(--navy); margin-bottom: 4px; }
.login-sub   { font-size: 13px; color: var(--muted); margin-bottom: 32px; }
.login-box input[type="password"] { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 6px; font-size: 15px; font-family: 'IBM Plex Sans', sans-serif; outline: none; transition: border-color 0.2s; margin-bottom: 12px; }
.login-box input[type="password"]:focus { border-color: var(--navy); }
.login-btn { width: 100%; padding: 12px; background: var(--navy); color: white; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; font-family: 'IBM Plex Sans', sans-serif; cursor: pointer; transition: background 0.2s; }
.login-btn:hover    { background: #0f3360; }
.login-btn:disabled { background: var(--muted); cursor: not-allowed; }
.login-error { color: var(--red); font-size: 13px; margin-top: 8px; min-height: 18px; }

/* ── APP ───────────────────────────────────────────────── */
#app { display: none; min-height: 100vh; }
.app-header { background: var(--navy); color: white; padding: 0 28px; height: 56px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.2); }
.header-logo { font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 15px; background: rgba(255,255,255,0.12); padding: 4px 10px; border-radius: 5px; letter-spacing: 0.5px; }
.header-title { font-size: 14px; font-weight: 500; opacity: 0.85; flex: 1; }
.header-badge { font-size: 11px; font-weight: 600; background: var(--teal); padding: 3px 10px; border-radius: 20px; letter-spacing: 0.5px; text-transform: uppercase; }
.header-badge.exec { background: var(--amber); }

/* ── TABS ──────────────────────────────────────────────── */
.tab-bar { background: white; border-bottom: 2px solid var(--border); padding: 0 28px; display: flex; }
.tab-btn { padding: 14px 20px; font-size: 13px; font-weight: 600; font-family: 'IBM Plex Sans', sans-serif; background: none; border: none; border-bottom: 3px solid transparent; margin-bottom: -2px; cursor: pointer; color: var(--muted); transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
.tab-btn.active       { color: var(--navy); border-bottom-color: var(--navy); }
.tab-btn:hover:not(.active) { color: var(--text); }
.tab-count { font-size: 11px; background: var(--amber); color: white; padding: 1px 7px; border-radius: 10px; font-weight: 700; }
.tab-panel        { display: none; }
.tab-panel.active { display: block; }
.content { padding: 24px 28px; max-width: 1100px; }
.section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 14px; }

/* ── EXEC SUMMARY CARDS ────────────────────────────────── */
.summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 28px; }
.summary-card { background: white; border: 1.5px solid var(--border); border-radius: 10px; padding: 18px 20px; }
.summary-card.warn { border-color: #f0b8b8; background: #fff5f5; }
.summary-card.amber { border-color: #f0d898; background: #fffbf0; }
.summary-card.green { border-color: #a8d8be; background: #f0faf5; }
.summary-num { font-size: 36px; font-weight: 700; color: var(--navy); line-height: 1; margin-bottom: 4px; font-family: 'IBM Plex Mono', monospace; }
.summary-card.warn  .summary-num  { color: var(--red); }
.summary-card.amber .summary-num  { color: #c8810a; }
.summary-card.green .summary-num  { color: var(--teal); }
.summary-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

/* ── EXEC TABS ─────────────────────────────────────────── */
.inner-tab-bar { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 18px; }
.inner-tab-btn { padding: 10px 16px; font-size: 13px; font-weight: 600; font-family: 'IBM Plex Sans', sans-serif; background: none; border: none; border-bottom: 3px solid transparent; margin-bottom: -2px; cursor: pointer; color: var(--muted); transition: all 0.2s; display: flex; align-items: center; gap: 7px; }
.inner-tab-btn.active       { color: var(--navy); border-bottom-color: var(--navy); }
.inner-tab-btn:hover:not(.active) { color: var(--text); }
.inner-tab-panel        { display: none; }
.inner-tab-panel.active { display: block; }

.inner-count { font-size: 11px; background: var(--border); color: var(--muted); padding: 1px 7px; border-radius: 10px; font-weight: 700; }
.inner-count.warn  { background: #fce8e8; color: var(--red); }
.inner-count.amber { background: #fff3e0; color: #c8810a; }
.inner-count.green { background: #e8f5ee; color: var(--teal); }

/* ── CONTRACTOR TABLE ──────────────────────────────────── */
.contractor-table { width: 100%; border-collapse: collapse; background: white; border: 1.5px solid var(--border); border-radius: 10px; overflow: hidden; }
.contractor-table th { padding: 10px 14px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); background: #f8fafb; border-bottom: 1.5px solid var(--border); text-align: left; }
.contractor-table td { padding: 11px 14px; font-size: 13px; border-bottom: 1px solid #f0f0f0; }
.contractor-table tr:last-child td { border-bottom: none; }
.contractor-table tr:hover td { background: var(--row); }

.mono { font-family: 'IBM Plex Mono', monospace; font-size: 11px; }

.doc-pip { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 10px; margin: 2px; }
.doc-pip.done    { background: #e8f5ee; color: #1a6640; }
.doc-pip.missing { background: #fce8e8; color: var(--red); }

.deployed-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 700; background: #fff3e0; color: #c8810a; padding: 2px 8px; border-radius: 10px; }
.warn-icon { font-size: 13px; }

.status-chip { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.3px; }
.chip-active   { background: #e8f5ee; color: #1a6640; }
.chip-pending  { background: #fff3e0; color: #c8810a; }
.chip-other    { background: #f0f0f0; color: var(--muted); }

/* ── HR CONTRACTOR CARD ────────────────────────────────── */
.contractor-card { background: white; border: 1.5px solid var(--border); border-radius: 10px; margin-bottom: 10px; overflow: hidden; transition: box-shadow 0.2s; }
.contractor-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
.contractor-card-header { padding: 14px 18px; display: flex; align-items: center; gap: 14px; cursor: pointer; user-select: none; }
.contractor-card-header:hover { background: var(--row); }
.cid-badge { font-family: 'IBM Plex Mono', monospace; font-size: 11px; background: var(--navy); color: white; padding: 3px 8px; border-radius: 4px; flex-shrink: 0; }
.contractor-info  { flex: 1; }
.contractor-name  { font-size: 15px; font-weight: 600; color: var(--navy); line-height: 1.2; }
.contractor-meta  { font-size: 12px; color: var(--muted); margin-top: 2px; }
.pending-count    { font-size: 12px; font-weight: 600; background: #fff3e0; color: #c8810a; padding: 4px 10px; border-radius: 20px; flex-shrink: 0; }
.chevron { color: var(--muted); font-size: 14px; transition: transform 0.2s; flex-shrink: 0; }
.contractor-card.open .chevron { transform: rotate(90deg); }
.contractor-card-body { display: none; border-top: 1px solid var(--border); padding: 16px 18px; background: #fafbfc; }
.contractor-card.open .contractor-card-body { display: block; }

/* ── UPLOAD RECORD ─────────────────────────────────────── */
.upload-record { background: white; border: 1.5px solid var(--border); border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
.upload-record-header { padding: 10px 14px; display: flex; align-items: center; gap: 10px; background: #f0f4ff; border-bottom: 1px solid var(--border); }
.upload-sub-id { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--navy); font-weight: 600; }
.upload-date   { font-size: 12px; color: var(--muted); flex: 1; }
.doc-decision-row { display: flex; align-items: flex-start; gap: 12px; padding: 10px 14px; border-bottom: 1px solid #f0f0f0; }
.doc-decision-row:last-of-type { border-bottom: none; }
.doc-decision-label { font-size: 13px; font-weight: 600; color: var(--text); width: 170px; flex-shrink: 0; padding-top: 6px; }
.doc-files { flex: 1; }
.doc-file-link { font-size: 12px; color: var(--navy); text-decoration: none; background: #e8f0fe; padding: 3px 10px; border-radius: 4px; display: inline-flex; align-items: center; gap: 4px; transition: background 0.15s; margin-bottom: 6px; margin-right: 4px; }
.doc-file-link:hover { background: #d0e4fe; }
.doc-empty { font-size: 12px; color: #bbb; font-style: italic; padding-top: 6px; }
.decision-btns { display: flex; gap: 6px; flex-shrink: 0; padding-top: 2px; }
.dec-btn { padding: 5px 12px; border-radius: 5px; font-size: 12px; font-weight: 600; font-family: 'IBM Plex Sans', sans-serif; border: 1.5px solid transparent; cursor: pointer; transition: all 0.15s; }
.dec-approve { background: #e8f5ee; color: var(--teal); border-color: #a8d8be; }
.dec-approve:hover, .dec-approve.selected { background: var(--teal); color: white; border-color: var(--teal); }
.dec-reject  { background: #fce8e8; color: var(--red); border-color: #f0b8b8; }
.dec-reject:hover,  .dec-reject.selected  { background: var(--red); color: white; border-color: var(--red); }
.rejection-reason { margin-top: 6px; display: none; }
.rejection-reason.visible { display: block; }
.rejection-reason input { width: 100%; padding: 7px 10px; border: 1.5px solid #f0b8b8; border-radius: 5px; font-size: 12px; font-family: 'IBM Plex Sans', sans-serif; outline: none; color: var(--text); }
.rejection-reason input:focus { border-color: var(--red); }
.rejection-reason input::placeholder { color: #bbb; }
.submit-row { padding: 12px 14px; border-top: 1.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: #fafbfc; gap: 12px; }
.submit-hint { font-size: 12px; color: var(--muted); flex: 1; }
.reviewed-badge { font-size: 12px; font-weight: 600; color: var(--teal); display: flex; align-items: center; gap: 4px; }

/* ── RECEIVED GRID ─────────────────────────────────────── */
.received-grid { display: flex; flex-wrap: wrap; gap: 8px; padding: 14px 20px; border-bottom: 1px solid var(--border); background: #f8fafb; }
.received-item { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; padding: 5px 12px; border-radius: 20px; background: white; border: 1.5px solid var(--border); }
.received-item.done    { background: #e8f5ee; border-color: #a8d8be; color: #1a6640; }
.received-item.missing { color: var(--muted); }
.received-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.done .received-dot    { background: var(--teal); }
.missing .received-dot { background: #ccc; }

/* ── UPLOAD TILES ──────────────────────────────────────── */
.upload-section { padding: 18px 20px; border-bottom: 1px solid var(--border); }
.upload-section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 14px; }
.upload-icon-grid { display: flex; flex-wrap: wrap; gap: 10px; }
.upload-tile { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 14px 12px; border: 1.5px dashed var(--border); border-radius: 10px; cursor: pointer; width: 100px; transition: all 0.18s; background: white; font-family: 'IBM Plex Sans', sans-serif; }
.upload-tile:hover { border-color: var(--navy); background: #f0f4ff; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(26,78,126,0.12); }
.upload-tile.crjm-tile:hover { border-color: var(--teal); background: #edf7f3; }
.tile-icon  { font-size: 24px; }
.tile-label { font-size: 11px; font-weight: 600; color: var(--navy); text-align: center; line-height: 1.3; }
.crjm-tile .tile-label { color: var(--teal); }
input[type="file"].hidden-file { display: none; }

/* ── CONTRACTOR DETAIL ─────────────────────────────────── */
.contractor-detail { background: white; border: 1.5px solid var(--border); border-radius: 12px; margin-bottom: 20px; overflow: hidden; }
.contractor-detail-header { padding: 18px 20px; background: linear-gradient(135deg, var(--navy) 0%, #1e6b5a 100%); color: white; display: flex; align-items: center; gap: 16px; }
.detail-cid   { font-family: 'IBM Plex Mono', monospace; font-size: 12px; background: rgba(255,255,255,0.18); padding: 4px 10px; border-radius: 5px; }
.detail-name  { font-size: 18px; font-weight: 600; flex: 1; }
.detail-email { font-size: 12px; opacity: 0.75; }
.status-pill  { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
.status-active  { background: rgba(125,190,66,0.25); color: #a0e060; }
.status-pending { background: rgba(232,163,23,0.25); color: #f0c040; }
.status-other   { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.7); }

/* ── SHARED ────────────────────────────────────────────── */
.btn { padding: 9px 20px; border-radius: 6px; font-size: 13px; font-weight: 600; font-family: 'IBM Plex Sans', sans-serif; border: none; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
.btn-navy { background: var(--navy); color: white; }
.btn-navy:hover    { background: #0f3360; }
.btn-navy:disabled { background: #bbb; cursor: not-allowed; }
.btn-cancel { background: var(--bg); color: var(--muted); border: 1.5px solid var(--border); }
.btn-cancel:hover { background: var(--border); color: var(--text); }

.search-wrap  { display: flex; gap: 10px; margin-bottom: 20px; }
.search-input { flex: 1; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; font-family: 'IBM Plex Sans', sans-serif; outline: none; transition: border-color 0.2s; }
.search-input:focus { border-color: var(--navy); }
.search-btn { padding: 11px 20px; background: var(--navy); color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; font-family: 'IBM Plex Sans', sans-serif; cursor: pointer; }
.search-btn:hover { background: #0f3360; }

.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

.state-box { text-align: center; padding: 48px 20px; color: var(--muted); font-size: 14px; }
.state-box .big-icon { font-size: 40px; margin-bottom: 12px; }

/* ── MODAL ─────────────────────────────────────────────── */
#uploadModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
#uploadModal.open { display: flex; }
.modal-box { background: white; border-radius: 12px; padding: 28px; width: 420px; box-shadow: 0 24px 60px rgba(0,0,0,0.2); }
.modal-title { font-size: 16px; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
.modal-sub   { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
.modal-file-zone { border: 2px dashed var(--border); border-radius: 8px; padding: 28px; text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 16px; }
.modal-file-zone:hover    { border-color: var(--navy); background: var(--row); }
.modal-file-zone.has-file { border-color: var(--teal); background: #edf7f3; }
.modal-file-name { font-size: 13px; font-weight: 600; color: var(--teal); margin-top: 6px; word-break: break-all; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
.modal-status { font-size: 13px; padding: 10px 14px; border-radius: 6px; margin-bottom: 12px; display: none; }
.modal-status.success { background: #e8f5ee; color: #1a6640; display: block; }
.modal-status.error   { background: #fce8e8; color: var(--red); display: block; }
.modal-status.loading { background: #f0f4ff; color: var(--navy); display: block; }

/* ── TOAST ─────────────────────────────────────────────── */
#toast { position: fixed; bottom: 28px; right: 28px; background: var(--text); color: white; padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; box-shadow: 0 8px 24px rgba(0,0,0,0.2); z-index: 9999; transition: opacity 0.3s, transform 0.3s; opacity: 0; transform: translateY(12px); pointer-events: none; }
#toast.show    { opacity: 1; transform: translateY(0); }
#toast.success { background: var(--teal); }
#toast.error   { background: var(--red); }
</style>
</head>
<body>

<!-- ── LOGIN ──────────────────────────────────────────────── -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">L</div>
    <div class="login-title">HR Document Portal</div>
    <div class="login-sub">LOOMI — The Loomex Group</div>
    <input type="password" id="passwordInput" placeholder="Enter password"
           onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" id="loginBtn" onclick="login()">Sign In</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ── APP ────────────────────────────────────────────────── -->
<div id="app">
  <div class="app-header">
    <div class="header-logo">LOOMI</div>
    <div class="header-title" id="headerTitle">HR — Document Review Portal</div>
    <div class="header-badge" id="headerBadge">HR Access</div>
  </div>

  <!-- HR TABS (shown for hr role) -->
  <div class="tab-bar" id="hrTabs" style="display:none">
    <button class="tab-btn active" id="tab-pending" onclick="switchTab('pending')">
      ⏳ Pending Review
      <span class="tab-count" id="pendingCount" style="display:none">0</span>
    </button>
    <button class="tab-btn" id="tab-search" onclick="switchTab('search')">🔍 Find Contractor</button>
    <button class="tab-btn" id="tab-exec"   onclick="switchTab('exec')">📊 Onboarding Status</button>
  </div>

   <!-- HR: Pending -->
  <div class="tab-panel content" id="panel-pending" style="display:none">
    <div class="section-title">Contractors with unreviewed document submissions</div>
    <div id="pendingList"><div class="state-box"><div class="big-icon">⏳</div>Loading...</div></div>
  </div>

  <!-- HR: Find Contractor -->
  <div class="tab-panel content" id="panel-search" style="display:none">
    <div class="search-wrap">
      <input class="search-input" id="searchInput" placeholder="Search by name or Contractor ID…"
             onkeydown="if(event.key==='Enter')doSearch()">
      <button class="search-btn" onclick="doSearch()">Search</button>
    </div>
    <div id="searchResults" style="display:none"></div>
  </div>

  <!-- SHARED: Exec/Onboarding Summary -->
  <div class="tab-panel content" id="panel-exec" style="display:none">
    <div id="execContent"><div class="state-box"><div class="big-icon">📊</div>Loading...</div></div>
  </div>
</div>

<!-- ── UPLOAD MODAL ────────────────────────────────────────── -->
<div id="uploadModal">
  <div class="modal-box">
    <div class="modal-title"  id="modalTitle">Upload Document</div>
    <div class="modal-sub"    id="modalSub"></div>
    <div class="modal-status" id="modalStatus"></div>
    <div class="modal-file-zone" id="modalFileZone"
         onclick="document.getElementById('modalFileInput').click()">
      <div style="font-size:28px;margin-bottom:6px">📎</div>
      <div style="font-size:13px;color:var(--muted)">Click to select file</div>
      <div class="modal-file-name" id="modalFileName"></div>
    </div>
    <input type="file" class="hidden-file" id="modalFileInput" onchange="onModalFileSelected()">
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn btn-navy"   id="modalUploadBtn" onclick="doModalUpload()" disabled>Upload</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const WORKER = 'https://loomex-hr.loomex-it.workers.dev';
let sessionToken = null;
let userRole     = null;

// ── AUTH ─────────────────────────────────────────────────────
async function login() {
  const pwd   = document.getElementById('passwordInput').value;
  const btn   = document.getElementById('loginBtn');
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  if (!pwd) { errEl.textContent = 'Please enter a password.'; return; }
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    const res  = await fetch(`${WORKER}/hr-auth`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd }),
    });
    const data = await res.json();
    if (!res.ok || !data.token) {
      errEl.textContent = 'Incorrect password.';
      btn.disabled = false; btn.textContent = 'Sign In'; return;
    }
    sessionToken = data.token;
    userRole     = data.role;
    initApp();
  } catch (e) {
    errEl.textContent = 'Connection error. Try again.';
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

function initApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display         = 'block';
  document.getElementById('headerTitle').textContent   = 'HR — Document Review Portal';
  document.getElementById('headerBadge').textContent   = 'HR Access';
  document.getElementById('hrTabs').style.display      = 'flex';
  showPanel('pending');
  loadPending();
}

// ── PENDING ───────────────────────────────────────────────────
async function loadPending() {

function renderContractorCard(group) {

function toggleCard(cid) { document.getElementById(`card-${cid}`).classList.toggle('open'); }

// ── UPLOAD RECORD ─────────────────────────────────────────────
const DOC_FIELDS = [
  { key: 'resume',         field: 'Resume',              label: 'Resume' },
  { key: 'aoda',           field: 'AODA Certificate',    label: 'AODA Certificate' },
  { key: 'molhs',          field: 'MOL H&S Certificate', label: 'MOL H&S Certificate' },
  { key: 'whmis',          field: 'WHMIS Certificate',   label: 'WHMIS Certificate' },
  { key: 'driversLicense', field: "Driver's License",    label: "Driver's License" },
];

function renderUploadRecord(u, c) {
  const date      = u.createdTime ? new Date(u.createdTime).toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';
  const recShort  = u.recordId.slice(-6).toUpperCase();
  const presentDocs = DOC_FIELDS.filter(d => u[d.key] && u[d.key].length > 0);

  if (u.reviewed) {
    return `<div class="upload-record" id="urec-${u.recordId}">
      <div class="upload-record-header">
        <span class="upload-sub-id">#${recShort}</span>
        <span class="upload-date">${date}</span>
        <span class="reviewed-badge">✅ Reviewed</span>
      </div></div>`;
  }

  if (presentDocs.length === 0) {
    return `<div class="upload-record" id="urec-${u.recordId}">
      <div class="upload-record-header">
        <span class="upload-sub-id">#${recShort}</span>
        <span class="upload-date">${date}</span>
        <span style="font-size:12px;color:var(--muted)">No files attached</span>
      </div></div>`;
  }

  const rows = presentDocs.map(d => {
    const files = u[d.key];
    const filesHtml = files.map(f => `<a class="doc-file-link" href="${f.url}" target="_blank">📄 ${f.filename}</a>`).join('');
    return `
    <div class="doc-decision-row" id="drow-${u.recordId}-${d.key}">
      <div class="doc-decision-label">${d.label}</div>
      <div class="doc-files">
        ${filesHtml}
        <div class="rejection-reason" id="reason-${u.recordId}-${d.key}">
          <input type="text" placeholder="Rejection reason (required)…" id="reasoninput-${u.recordId}-${d.key}">
        </div>
      </div>
      <div class="decision-btns">
        <button class="dec-btn dec-approve selected" id="approve-${u.recordId}-${d.key}"
          onclick="setDecision('${u.recordId}','${d.key}','${escStr(d.field)}',true)">✓ Accept</button>
        <button class="dec-btn dec-reject" id="reject-${u.recordId}-${d.key}"
          onclick="setDecision('${u.recordId}','${d.key}','${escStr(d.field)}',false)">✗ Reject</button>
      </div>
    </div>`;
  }).join('');

  return `
  <div class="upload-record" id="urec-${u.recordId}"
       data-contractor-id="${c.contractorId}"
       data-contractor-record-id="${c.recordId || ''}"
       data-contractor-name="${escStr(c.name)}"
       data-contractor-email="${escStr(c.email)}">
    <div class="upload-record-header">
      <span class="upload-sub-id">#${recShort}</span>
      <span class="upload-date">${date}</span>
      ${u.notes ? `<span style="font-size:12px;color:var(--muted);font-style:italic">${u.notes}</span>` : ''}
    </div>
    ${rows}
    <div class="submit-row">
      <div class="submit-hint">All documents default to Accept. Toggle any to Reject and add a reason.</div>
      <button class="btn btn-navy" id="submitbtn-${u.recordId}" onclick="submitDecisions('${u.recordId}')">Submit Review</button>
    </div>
  </div>`;
}

const decisionState = {};

function setDecision(recordId, key, field, approved) {
  if (!decisionState[recordId]) decisionState[recordId] = {};
  if (!decisionState[recordId][key]) decisionState[recordId][key] = { field, approved: true, reason: '' };
  decisionState[recordId][key].approved = approved;
  decisionState[recordId][key].field    = field;
  document.getElementById(`approve-${recordId}-${key}`).classList.toggle('selected', approved);
  document.getElementById(`reject-${recordId}-${key}`).classList.toggle('selected', !approved);
  document.getElementById(`reason-${recordId}-${key}`).classList.toggle('visible', !approved);
}

async function submitDecisions(recordId) {
  const el  = document.getElementById(`urec-${recordId}`);
  const btn = document.getElementById(`submitbtn-${recordId}`);
  const contractorId       = el.dataset.contractorId;
  const contractorRecordId = el.dataset.contractorRecordId;
  const contractorName     = el.dataset.contractorName;
  const contractorEmail    = el.dataset.contractorEmail;

  const rows = el.querySelectorAll('.doc-decision-row');
  const decisions = [];
  let hasError = false;

  rows.forEach(row => {
    const key      = row.id.split('-').pop();
    const state    = decisionState[recordId]?.[key];
    const approved = state ? state.approved : true;
    const field    = state ? state.field : DOC_FIELDS.find(d => d.key === key)?.field || key;
    let   reason   = '';
    if (!approved) {
      reason = document.getElementById(`reasoninput-${recordId}-${key}`)?.value?.trim() || '';
      if (!reason) { document.getElementById(`reasoninput-${recordId}-${key}`).style.borderColor = 'var(--red)'; hasError = true; }
    }
    decisions.push({ field, approved, reason });
  });

  if (hasError) { showToast('Please enter a rejection reason for all rejected documents.', 'error'); return; }

  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Processing…';

  try {
    const res  = await fetch(`${WORKER}/hr-approve`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: sessionToken, uploadRecordId: recordId, contractorRecordId, contractorId, contractorName, contractorEmail, decisions }),
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);

    const parts = [];
    if (data.approved > 0) parts.push(`${data.approved} uploaded to SharePoint`);
    if (data.rejected > 0) parts.push(`${data.rejected} rejected — contractor notified`);

    el.innerHTML = `<div class="upload-record-header">
      <span class="upload-sub-id">#${recordId.slice(-6).toUpperCase()}</span>
      <span class="upload-date" style="flex:1"></span>
      <span class="reviewed-badge">✅ ${parts.join(', ')}</span>
    </div>`;

    showToast(parts.join(', '), 'success');
    refreshPendingCount();
  } catch (e) {
    btn.disabled = false; btn.innerHTML = 'Submit Review';
    showToast('Error: ' + e.message, 'error');
  }
}

function refreshPendingCount() {
  const pending = document.querySelectorAll('[id^="submitbtn-"]').length;
  const el      = document.getElementById('pendingCount');
  el.textContent = pending; el.style.display = pending > 0 ? 'inline' : 'none';
}

function renderContractorDetail(c) {

    { key: 'resume', label: 'Resume' }, { key: 'aoda', label: 'AODA' },

    { type: 'resume', icon: '📄', label: 'Resume',    crjm: false },
    { type: 'aoda',   icon: '♿', label: 'AODA Cert', crjm: false },
    { type: 'molhs',  icon: '🦺', label: 'MOL H&S',   crjm: false },
    { type: 'whmis',  icon: '⚗️', label: 'WHMIS Cert',crjm: false },
    { type: 'drivers',icon: '🪪', label: 'Driver Lic.',crjm: false },
    { type: 'crjm',   icon: '🔍', label: 'CRJM Check',crjm: true  },
    { type: 'other',  icon: '📁', label: 'Other Doc', crjm: false },
  ];

  const uploadsHtml = c.uploads.length
    ? c.uploads.map(u => renderUploadRecord(u, c)).join('')

  return `
  <div class="contractor-detail">
    <div class="contractor-detail-header">
      <div>
        <div class="detail-cid">${c.contractorId}</div>
        <div class="detail-name">${c.name}</div>
        <div class="detail-email">${c.email}</div>
      </div>
      <span class="status-pill ${statusClass}" style="margin-left:auto">${c.status || 'Unknown'}</span>
    </div>
    <div class="received-grid">
      ${checks.map(ch => `<div class="received-item ${c.checksReceived[ch.key] ? 'done' : 'missing'}"><div class="received-dot"></div>${ch.label}</div>`).join('')}
    </div>
    <div class="upload-section">
      <div class="upload-section-title">Upload to Contractor Folder</div>
      <div class="upload-icon-grid">
        ${tiles.map(t => `
          <div class="upload-tile ${t.crjm ? 'crjm-tile' : ''}"
               onclick="openUploadModal('${c.contractorId}','${escStr(c.name)}','${c.recordId}','${t.type}','${escStr(labelMap[t.type] || t.label)}',${t.crjm})">

// ── EXEC SUMMARY ──────────────────────────────────────────────
let execData = null;

async function loadExecSummary() {
  const el = document.getElementById('execContent');
  el.innerHTML = '<div class="state-box"><div class="big-icon">📊</div>Loading…</div>';
  try {
    const res  = await fetch(`${WORKER}/hr-exec-summary?token=${encodeURIComponent(sessionToken)}`);
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    execData = data;
    renderExecSummary(data);
  } catch (e) {
    el.innerHTML = `<div class="state-box"><div class="big-icon">⚠️</div>${e.message}</div>`;
  }
}

function renderExecSummary(data) {
  const s = data.summary;
  const contractors = data.contractors;

  const complete       = contractors.filter(c => c.complete);
  const missingDocs    = contractors.filter(c => !c.allDocsComplete && !c.missingContract);
  const missingCrjm    = contractors.filter(c => !c.crjm);
  const missingContract= contractors.filter(c => c.missingContract);

  const html = `
  <div class="summary-grid">
    <div class="summary-card">
      <div class="summary-num">${s.total}</div>
      <div class="summary-label">Total Contractors</div>
    </div>
    <div class="summary-card green">
      <div class="summary-num">${s.complete}</div>
      <div class="summary-label">Fully Complete</div>
    </div>
    <div class="summary-card ${s.missingDocs > 0 ? 'warn' : ''}">
      <div class="summary-num">${s.missingDocs}</div>
      <div class="summary-label">Missing Documents</div>
    </div>
    <div class="summary-card ${s.missingCrjm > 0 ? 'amber' : ''}">
      <div class="summary-num">${s.missingCrjm}</div>
      <div class="summary-label">Missing CRJM</div>
    </div>
    <div class="summary-card ${s.missingContract > 0 ? 'amber' : ''}">
      <div class="summary-num">${s.missingContract}</div>
      <div class="summary-label">Missing Contract</div>
    </div>
    ${s.deployedWarning > 0 ? `
    <div class="summary-card warn">
      <div class="summary-num">⚠️ ${s.deployedWarning}</div>
      <div class="summary-label">Deployed — Incomplete</div>
    </div>` : ''}
  </div>

  <div class="inner-tab-bar">
    <button class="inner-tab-btn active" id="itab-complete"  onclick="switchInnerTab('complete')">
      ✅ Complete <span class="inner-count green">${complete.length}</span>
    </button>
    <button class="inner-tab-btn" id="itab-missingdocs"  onclick="switchInnerTab('missingdocs')">
      📄 Missing Docs <span class="inner-count ${missingDocs.length > 0 ? 'warn' : ''}">${missingDocs.length}</span>
    </button>
    <button class="inner-tab-btn" id="itab-missingcrjm"  onclick="switchInnerTab('missingcrjm')">
      🔍 Missing CRJM <span class="inner-count ${missingCrjm.length > 0 ? 'amber' : ''}">${missingCrjm.length}</span>
    </button>
    <button class="inner-tab-btn" id="itab-missingcontract" onclick="switchInnerTab('missingcontract')">
      📝 Missing Contract <span class="inner-count ${missingContract.length > 0 ? 'amber' : ''}">${missingContract.length}</span>
    </button>
  </div>

  <div class="inner-tab-panel active" id="ipanel-complete">
    ${renderContractorTable(complete, 'complete')}
  </div>
  <div class="inner-tab-panel" id="ipanel-missingdocs">
    ${renderContractorTable(missingDocs, 'missingdocs')}
  </div>
  <div class="inner-tab-panel" id="ipanel-missingcrjm">
    ${renderContractorTable(missingCrjm, 'missingcrjm')}
  </div>
  <div class="inner-tab-panel" id="ipanel-missingcontract">
    ${renderContractorTable(missingContract, 'missingcontract')}
  </div>`;

  document.getElementById('execContent').innerHTML = html;
}

function switchInnerTab(tab) {
  document.querySelectorAll('.inner-tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.inner-tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`itab-${tab}`).classList.add('active');
  document.getElementById(`ipanel-${tab}`).classList.add('active');
}

function renderContractorTable(list, context) {
  if (!list.length) return '<div class="state-box" style="padding:32px"><div class="big-icon">✅</div>None in this category.</div>';

  const docKeys = [
    { key: 'resume', label: 'Resume' },
    { key: 'aoda',   label: 'AODA' },
    { key: 'molhs',  label: 'H&S' },
    { key: 'whmis',  label: 'WHMIS' },
    { key: 'driversLicense', label: 'DL' },
  ];

  const rows = list.map(c => {
    const statusChip = c.status === 'Active' ? 'chip-active' : c.status === 'VP Approved' ? 'chip-pending' : 'chip-other';
    const deployedHtml = c.deployedWarning
      ? `<span class="deployed-badge"><span class="warn-icon">⚠️</span> Deployed</span>`
      : c.isDeployed ? `<span class="deployed-badge" style="background:#e8f5ee;color:#1a6640">✓ Deployed</span>` : '';

    const docTypeMap = { resume: 'resume', aoda: 'aoda', molhs: 'molhs', whmis: 'whmis', driversLicense: 'drivers' };
    const docLabelMap = { resume: 'Resume', aoda: 'AODA Certificate', molhs: 'MOL H&S Certificate', whmis: 'WHMIS Certificate', driversLicense: "Driver's License" };

    const docPips = docKeys.map(d => {
      const done = c.docs[d.key];
      if (done) return `<span class="doc-pip done">✓ ${d.label}</span>`;
      return `<span class="doc-pip missing" style="cursor:pointer" title="Click to upload ${d.label}"
        onclick="openUploadModal('${c.contractorId}','${escStr(c.name)}','${c.recordId}','${docTypeMap[d.key]}','${escStr(docLabelMap[d.key])}',false)">
        ⬆ ${d.label}</span>`;
    }).join('');

    const crjmPip = c.crjm
      ? `<span class="doc-pip done">✓ CRJM</span>`
      : `<span class="doc-pip missing" style="cursor:pointer" title="Click to upload CRJM"
          onclick="openUploadModal('${c.contractorId}','${escStr(c.name)}','${c.recordId}','crjm','CRJM Check',true)">
          ⬆ CRJM</span>`;

    return `<tr>
      <td class="mono">${c.contractorId}</td>
      <td><strong>${c.name}</strong>${deployedHtml ? '<br>' + deployedHtml : ''}</td>
      <td><span class="status-chip ${statusChip}">${c.status || '—'}</span></td>
      <td>${docPips}${context === 'missingcrjm' || context === 'complete' ? crjmPip : ''}</td>
    </tr>`;
  }).join('');

  return `
  <table class="contractor-table">
    <thead>
      <tr>
        <th>Contractor ID</th>
        <th>Name</th>
        <th>Status</th>
        <th>Documents</th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ── MODAL ─────────────────────────────────────────────────────
let modalCtx = {}, modalFile = null;

function openUploadModal(contractorId, contractorName, contractorRecordId, docType, docLabel, isCrjm) {
  modalCtx  = { contractorId, contractorName, contractorRecordId, docType, docLabel, isCrjm };
  modalFile = null;
  document.getElementById('modalTitle').textContent    = isCrjm ? '🔍 Upload CRJM Check' : `📄 Upload ${docLabel}`;
  document.getElementById('modalSub').textContent      = isCrjm
    ? `Upload the cleared CRJM result for ${contractorName}. Their record will be marked complete.`
    : `Upload ${docLabel} for ${contractorName}. File will be saved to their SharePoint folder.`;
  document.getElementById('modalFileName').textContent = '';
  document.getElementById('modalFileZone').classList.remove('has-file');
  document.getElementById('modalFileInput').value      = '';
  document.getElementById('modalUploadBtn').disabled   = true;
  setModalStatus('', '');
  document.getElementById('uploadModal').classList.add('open');
}

function closeModal() { document.getElementById('uploadModal').classList.remove('open'); modalCtx = {}; modalFile = null; }

function onModalFileSelected() {
  modalFile = document.getElementById('modalFileInput').files[0] || null;
  if (modalFile) {
    document.getElementById('modalFileName').textContent = modalFile.name;
    document.getElementById('modalFileZone').classList.add('has-file');
    document.getElementById('modalUploadBtn').disabled = false;
  }
}

function setModalStatus(msg, type) {
  const el = document.getElementById('modalStatus');
  el.className = `modal-status ${type}`; el.textContent = msg; el.style.display = msg ? 'block' : 'none';
}

async function doModalUpload() {
  if (!modalFile) return;
  const btn = document.getElementById('modalUploadBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Uploading…';
  setModalStatus('Uploading file…', 'loading');
  try {
    const b64 = await fileToBase64(modalFile);
    const ext  = modalFile.name.split('.').pop().toLowerCase();
    if (modalCtx.isCrjm) {
      const res  = await fetch(`${WORKER}/hr-crjm-upload`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: sessionToken, contractorId: modalCtx.contractorId, contractorName: modalCtx.contractorName, contractorRecordId: modalCtx.contractorRecordId, fileBase64: b64, fileExt: ext }),
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.error);
      setModalStatus('✅ CRJM file uploaded. Contractor marked complete.', 'success');
      showToast('CRJM uploaded', 'success');
    try {
    const b64 = await fileToBase64(modalFile);
    const ext  = modalFile.name.split('.').pop().toLowerCase();
    if (modalCtx.isCrjm) {
      const res  = await fetch(`${WORKER}/hr-crjm-upload`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: sessionToken, contractorId: modalCtx.contractorId, contractorName: modalCtx.contractorName, contractorRecordId: modalCtx.contractorRecordId, fileBase64: b64, fileExt: ext }),
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.error);
      setModalStatus('✅ CRJM file uploaded. Contractor marked complete.', 'success');
      showToast('CRJM uploaded', 'success');
    } else {
      const labelMap = {
        resume:  `${modalCtx.contractorName} - Resume`,
        aoda:    `${modalCtx.contractorName} - AODA Certificate`,
        molhs:   `${modalCtx.contractorName} - MOL H&S Certificate`,
        whmis:   `${modalCtx.contractorName} - WHMIS Certificate`,
        drivers: `${modalCtx.contractorName} - Drivers License`,
        other:   `${modalCtx.contractorName} - ${modalFile.name}`,
      };
      const checkboxMap = {
        resume:  'Resume',
        aoda:    'AODA Certificate',
        molhs:   'Health & Safety Certificate',
        whmis:   'WHMIS Certificate',
        drivers: "Driver's License",
      };
      const base     = labelMap[modalCtx.docType] || `${modalCtx.contractorName} - ${modalCtx.docLabel}`;
      const fileName = `${base}.${ext}`;
      const res  = await fetch(`${WORKER}/hr-file-upload`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          token:              sessionToken,
          contractorId:       modalCtx.contractorId,
          contractorName:     modalCtx.contractorName,
          contractorRecordId: modalCtx.contractorRecordId,
          fileBase64:         b64,
          fileName,
          checkboxField:      checkboxMap[modalCtx.docType] || null,
        }),
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.error);
      setModalStatus(`✅ ${fileName} uploaded.`, 'success');
      showToast('File uploaded to SharePoint', 'success');
    }
    btn.innerHTML = '✓ Done';
    setTimeout(() => { closeModal(); if (userRole === 'hr') doSearch(); }, 1800);
  } catch (e) {
    setModalStatus('Upload failed: ' + e.message, 'error');
    btn.disabled = false; btn.innerHTML = 'Upload';
  }
}

// ── UTILS ─────────────────────────────────────────────────────
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result); r.onerror = () => reject(new Error('File read failed'));
    r.readAsDataURL(file);
  });
}

function escStr(s) { return (s || '').replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `show ${type}`;
  clearTimeout(el._timer); el._timer = setTimeout(() => el.className = '', 3500);
}
</script>
</body>
