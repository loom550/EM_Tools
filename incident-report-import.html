<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Incident Report Importer | Loomex Tools</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a2e; font-size: 14px; min-height: 100vh; }
    #root { max-width: 1400px; margin: 0 auto; padding: 0 16px 40px; }
    #loading { text-align: center; padding: 60px; color: #7a8499; font-size: 14px; }
    .topbar { background: #1a1a2e; color: #fff; padding: 12px 16px; margin: 0 -16px 0; display: flex; align-items: center; gap: 12px; }
    .topbar-logo { width: 4px; height: 28px; background: #e8620a; border-radius: 2px; flex-shrink: 0; }
    .topbar-title { font-size: 15px; font-weight: 600; letter-spacing: 0.04em; }
    .topbar-sub { font-size: 11px; color: #8888aa; margin-top: 2px; }
    .topbar-user { margin-left: auto; font-size: 12px; color: #8888aa; display: flex; align-items: center; gap: 8px; }
    .topbar-user strong { color: #4caf92; }
    .topbar-signin { background: #e8620a; color: #fff; border: none; border-radius: 5px; padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .topbar-signin:hover { background: #d05508; }
    .session-bar { background: #252840; border-bottom: 1px solid #33374f; padding: 10px 16px; margin: 0 -16px 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .session-bar-label { font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: #8888aa; white-space: nowrap; }
    .session-input { background: #1a1a2e !important; border: 1px solid #33374f !important; color: #e0e4f0 !important; border-radius: 5px; padding: 5px 10px; font-size: 13px; font-family: 'SF Mono', 'Consolas', monospace; outline: none; width: 220px; }
    .session-input:focus { border-color: #e8620a !important; }
    .session-input::placeholder { color: #5a6080; }
    .session-bar-hint { font-size: 11px; color: #5a6080; margin-left: 4px; }
    .session-divider { width: 1px; height: 24px; background: #33374f; }
    .card { background: #fff; border: 1px solid #e0e4ec; border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
    .card-header { padding: 10px 16px; background: #f8f9fc; border-bottom: 1px solid #e0e4ec; display: flex; justify-content: space-between; align-items: center; }
    .card-header-title { font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: #5a6478; }
    .card-body { padding: 14px 16px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 14px; }
    .field-label { display: block; font-size: 10px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: #7a8499; margin-bottom: 4px; }
    input[type=text], input[type=date], input[type=time], select, textarea { width: 100%; padding: 7px 10px; font-size: 13px; font-family: 'SF Mono', 'Consolas', monospace; background: #f8f9fc; border: 1px solid #d0d5e0; border-radius: 5px; color: #1a1a2e; outline: none; transition: border-color 0.15s; }
    input:focus, select:focus, textarea:focus { border-color: #e8620a; background: #fff; }
    textarea { resize: vertical; }
    button { cursor: pointer; border-radius: 5px; font-size: 13px; font-weight: 500; border: 1px solid #d0d5e0; background: #fff; color: #1a1a2e; padding: 7px 14px; transition: all 0.15s; }
    button:hover:not(:disabled) { background: #f0f2f5; }
    button.primary { background: #e8620a; color: #fff; border-color: #e8620a; }
    button.primary:hover:not(:disabled) { background: #d05508; }
    button.primary:disabled { background: #ccc; border-color: #ccc; cursor: not-allowed; }
    button.ghost { background: transparent; border: none; color: #8888aa; padding: 4px 8px; font-size: 12px; }
    button.ghost:hover { color: #fff; }
    .badge-warn { font-size: 10px; font-weight: 600; background: #fff3e0; color: #b45309; padding: 2px 7px; border-radius: 4px; }
    .notice-error { background: #fce8e8; border: 1px solid #f5c2c2; color: #b91c1c; padding: 10px 14px; border-radius: 5px; font-size: 13px; margin-bottom: 12px; }
    .main-layout { display: grid; grid-template-columns: 230px 1fr; gap: 14px; align-items: start; }
    .review-layout { display: grid; grid-template-columns: 260px 1fr; gap: 12px; align-items: start; }
    .sticky { position: sticky; top: 14px; }
    .raw-pre { max-height: 65vh; overflow-y: auto; padding: 12px; font-family: 'SF Mono', 'Consolas', monospace; font-size: 11px; color: #5a6478; white-space: pre-wrap; line-height: 1.7; }
    .dropzone { border: 2px dashed #c8cdd8; border-radius: 8px; padding: 24px 16px; text-align: center; cursor: pointer; transition: all 0.15s; margin-bottom: 10px; background: #fff; }
    .dropzone:hover, .dropzone.drag { border-color: #e8620a; background: #fff7f3; }
    .queue-item { padding: 9px 14px; cursor: pointer; border-bottom: 1px solid #f0f2f5; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .queue-item:last-child { border-bottom: none; }
    .queue-item.active { background: #f8f9fc; border-left: 3px solid #e8620a; padding-left: 11px; }
    .queue-item:not(.active):hover { background: #fafafa; }
    .q-name { font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .q-err { font-size: 10px; color: #b91c1c; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .field-row { margin-bottom: 10px; }
    .span-2 { grid-column: 1 / -1; }
    .radio-row { display: flex; gap: 20px; padding-top: 5px; }
    .radio-row label { display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; }
    .action-bar { display: flex; align-items: center; gap: 10px; padding: 4px 0 16px; }
    .done-panel { padding: 32px; text-align: center; }
    .done-msg { font-size: 14px; color: #1a7a50; margin-bottom: 14px; }
    .empty-state { padding: 40px; text-align: center; color: #aab0be; font-size: 13px; }
    .center-msg { padding: 28px; text-align: center; color: #7a8499; font-size: 13px; }
    .clear-btn { font-size: 11px; color: #aab0be; cursor: pointer; text-decoration: underline; }
    .clear-btn:hover { color: #e8620a; }
    .sign-warn { font-size: 12px; color: #b45309; }
    .progress-note { font-size: 12px; color: #aab0be; margin-left: auto; }
    .auth-error { font-size: 12px; color: #b91c1c; }
  </style>
</head>
<body>
  <div id="root"><div id="loading">Loading…</div></div>

  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>
  <script src="https://unpkg.com/mammoth@1.8.0/mammoth.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.5.0/lib/msal-browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    // ── Config ───────────────────────────────────────────────────────────────

    const CONFIG = {
      siteUrl:  'https://loomex.sharepoint.com/sites/21000-response',
      listName: 'Incident Reports',
      clientId: '914594ac-bf39-47af-b4a1-2a5cc859beb2',
      tenantId: 'f37e3a4c-5aaa-4bf9-93d2-cc21b157eb4c',
    };

    const SCOPES = ['https://graph.microsoft.com/Sites.ReadWrite.All', 'User.Read'];

    // ── Fields ───────────────────────────────────────────────────────────────
    // IncidentID removed (SP generates row ID)
    // ActivationID and HubID managed via session bar
    // DocumentURL, Attachments, AttachmentFolder, RecordStatus removed (system-managed)

    const FIELDS = [
      { key:'ReportNumber',        label:'Report Number',       group:'Reference', manual:true },
      { key:'IncidentTitle',       label:'Title',               group:'Incident' },
      { key:'IncidentDate',        label:'Date',                group:'Incident', type:'date' },
      { key:'IncidentTime',        label:'Time',                group:'Incident', type:'time' },
      { key:'IncidentType',        label:'Type',                group:'Incident' },
      { key:'Severity',            label:'Severity',            group:'Incident', type:'select', options:['Minor','Moderate','Major','Unknown'] },
      { key:'IncidentStatus',      label:'Status',              group:'Incident', type:'select', options:['Assistance Required','Major Assistance Required','Under Control','Resolved','Closed','Unknown'] },
      { key:'ICName',              label:'IC Name',             group:'Incident Commander' },
      { key:'ICDept',              label:'IC Department',       group:'Incident Commander' },
      { key:'ICContact',           label:'IC Contact',          group:'Incident Commander' },
      { key:'StreetAddress',       label:'Street Address',      group:'Location' },
      { key:'Intersection1',       label:'Intersection 1',      group:'Location' },
      { key:'Intersection2',       label:'Intersection 2',      group:'Location' },
      { key:'LeadAgency',          label:'Lead Agency',         group:'Agencies' },
      { key:'SupportingAgencies',  label:'Supporting Agencies', group:'Agencies' },
      { key:'RelatedEvents',       label:'Related Events',      group:'Agencies' },
      { key:'SituationSummary',    label:'Situation Summary',   group:'Narrative', type:'textarea' },
      { key:'AnticipatedActions',  label:'Anticipated Actions', group:'Narrative', type:'textarea' },
      { key:'Prognosis',           label:'Prognosis',           group:'Narrative', type:'select', options:['Improving','Stable','Worsening','Unknown'] },
      { key:'FatalitiesYN',        label:'Fatalities?',         group:'Casualties', type:'bool' },
      { key:'FatalitiesDetails',   label:'Details',             group:'Casualties', type:'textarea' },
      { key:'InjuriesYN',          label:'Injuries?',           group:'Casualties', type:'bool' },
      { key:'InjuriesDetails',     label:'Details',             group:'Casualties', type:'textarea' },
      { key:'EvacueesYN',          label:'Evacuees affected?',  group:'Casualties', type:'bool' },
      { key:'EvacueesDetails',     label:'Details',             group:'Casualties', type:'textarea' },
      { key:'CompletedByName',     label:'Name',                group:'Completed By' },
      { key:'CompletedByPosition', label:'Position',            group:'Completed By' },
      { key:'CompletedByContact',  label:'Contact',             group:'Completed By' },
      { key:'CompletedDate',       label:'Date completed',      group:'Completed By', type:'date' },
      { key:'Distribution',        label:'Distribution',        group:'Completed By' },
    ];
    const GROUPS = [...new Set(FIELDS.map(f => f.group))];

    // ── Extraction ───────────────────────────────────────────────────────────

    function extract(text) {

      const toDate = str => {
        if (!str) return '';
        const m = str.trim().match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
        if (m) {
          const year = m[3].length === 2 ? '20' + m[3] : m[3];
          const a = parseInt(m[1]);
          const [day, month] = a > 12 ? [m[1], m[2]] : [m[1], m[2]];
          return `${year}-${month.padStart(2,'0')}-${day.padStart(2,'0')}`;
        }
        if (/^\d{4}-\d{2}-\d{2}$/.test(str.trim())) return str.trim();
        return '';
      };

      const toTime = str => {
        if (!str) return '';
        str = str.trim();
        const pmM = str.match(/^(\d{1,2}):(\d{2})\s*pm$/i);
        const amM = str.match(/^(\d{1,2}):(\d{2})\s*am$/i);
        if (pmM) { let h = parseInt(pmM[1]); if (h < 12) h += 12; return `${h.toString().padStart(2,'0')}:${pmM[2]}`; }
        if (amM) { let h = parseInt(amM[1]); if (h === 12) h = 0; return `${h.toString().padStart(2,'0')}:${amM[2]}`; }
        if (/^\d{1,2}:\d{2}$/.test(str)) return str.padStart(5, '0');
        return '';
      };

      // Extract the value of checked checkbox (☑ or ✓) from a list of options
      const checkedOne = (haystack, ...options) => {
        for (const opt of options) {
          const re = new RegExp('[☑✓✅]\\s*' + opt.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'i');
          if (re.test(haystack)) return opt;
        }
        return '';
      };

      // Extract all checked checkboxes from a list
      const checkedMany = (haystack, ...options) => {
        return options
          .filter(opt => new RegExp('[☑✓✅]\\s*' + opt.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'i').test(haystack))
          .join(', ');
      };

      // Build label→content segment map
      const lines = text.split('\n');
      const segments = {};
      let curKey = null;
      let curLines = [];

      const flush = () => {
        if (curKey !== null) {
          segments[curKey] = curLines.filter(l => l.trim()).join('\n').trim();
        }
      };

      for (const raw of lines) {
        const line = raw.trim();
        const ci = line.indexOf(':');
        const labelPart = ci > 0 ? line.substring(0, ci) : '';
        const isLabel = ci > 0
          && labelPart.length <= 50
          && /^[\w\s\/\(\)\-&]+$/.test(labelPart)
          && labelPart.trim().length > 0;

        if (isLabel) {
          flush();
          curKey = labelPart.trim().toLowerCase();
          const rest = line.substring(ci + 1).trim();
          curLines = rest ? [rest] : [];
        } else if (curKey !== null) {
          curLines.push(line);
        }
      }
      flush();

      const get = (...keys) => {
        for (const k of keys) {
          const v = segments[k.toLowerCase()];
          if (v) return v.split('\n')[0].trim();
        }
        return '';
      };

      const getAll = (...keys) => {
        for (const k of keys) {
          const v = segments[k.toLowerCase()];
          if (v) return v.trim();
        }
        return '';
      };

      const f = {};

      f.ReportNumber        = get('report number', 'report #', 'report no', 'report no.');
      f.IncidentTitle       = get('title', 'incident title', 'subject');
      f.IncidentDate        = toDate(get('incident date', 'date'));
      f.IncidentTime        = toTime(get('incident time', 'time'));
      f.IncidentType        = get('incident type', 'type of incident', 'type');
      f.StreetAddress       = get('location', 'address', 'street address', 'location of incident/event', 'location of incident');
      f.Intersection1       = get('intersection 1', 'cross street 1');
      f.Intersection2       = get('intersection 2', 'cross street 2');
      f.LeadAgency          = get('lead agency', 'reporting agency', 'agency');
      f.RelatedEvents       = get('related events', 'related event');
      f.ICName              = get('name', 'ic name', 'commander name');
      f.ICDept              = get('dept/agency', 'dept', 'department', 'ic department', 'ic dept');
      f.ICContact           = get('contact number', 'ic contact', 'phone');
      f.SituationSummary    = getAll('situation summary', 'summary', 'description', 'narrative', 'details of incident', 'details');
      f.AnticipatedActions  = getAll('anticipated actions', 'actions taken', 'actions', 'next steps', 'response');
      f.Prognosis           = get('prognosis');
      f.CompletedByName     = get('completed by', 'submitted by', 'reported by', 'prepared by', 'author');
      f.CompletedByPosition = get('position', 'role', 'job title');
      f.CompletedByContact  = get('email', 'contact email');
      f.Distribution        = get('distribution');

      // Severity -- check for explicit checkbox first, then field, then keyword on narrative only
      const severityOpts = ['Major', 'Moderate', 'Minor', 'Unknown'];
      f.Severity = checkedOne(text, ...severityOpts)
        || (() => { const v = get('severity', 'incident severity'); return severityOpts.find(o => new RegExp(o, 'i').test(v)) || ''; })()
        || (() => { const n = f.SituationSummary + ' ' + f.AnticipatedActions; return severityOpts.slice(0,3).find(o => new RegExp('\\b' + o + '\\b', 'i').test(n)) || ''; })();

      // Incident status -- checkbox first, then field
      const statusOpts = ['Major Assistance Required', 'Assistance Required', 'Under Control', 'Resolved', 'Closed', 'Unknown'];
      f.IncidentStatus = checkedOne(text, ...statusOpts)
        || (() => { const v = get('incident status', 'status'); return statusOpts.find(o => new RegExp(o, 'i').test(v)) || ''; })();

      // Supporting agencies -- all checked boxes
      const agencyOpts = ['Police','Fire','Emergency Medical Services','Animal Control','By-Law',
        'Ministry of Emergency Preparedness and Response','Ministry of Natural Resources',
        'Ministry of Labour','Ministry of Environment','Provincial HUSAR Team','Provincial Hazmat Teams','Other'];
      const agencySection = getAll('supporting agencies', 'agencies');
      f.SupportingAgencies = checkedMany(agencySection || text, ...agencyOpts);

      // Prognosis keyword fallback
      if (!f.Prognosis) {
        if (/\bworsening\b/i.test(text))      f.Prognosis = 'Worsening';
        else if (/\bimproving\b/i.test(text)) f.Prognosis = 'Improving';
        else if (/\bstable\b/i.test(text))    f.Prognosis = 'Stable';
      }

      // Booleans -- narrative content only
      const narrativeText = f.SituationSummary + ' ' + f.AnticipatedActions + ' ' + getAll('injuries','fatalities','evacuees');
      f.FatalitiesYN = /\b(?:fatal|death|deceased|fatality)\b/i.test(narrativeText) ? 'true' : 'false';
      f.InjuriesYN   = /\b(?:injur|hurt|wounded)\b/i.test(narrativeText)            ? 'true' : 'false';
      f.EvacueesYN   = /\b(?:evacuee|evacuated|displaced)\b/i.test(narrativeText)   ? 'true' : 'false';

      f.CompletedDate = new Date().toISOString().split('T')[0];
      return f;
    }

    // ── Graph API ────────────────────────────────────────────────────────────

    async function resolveSiteList(token) {
      const u = new URL(CONFIG.siteUrl);
      const sr = await fetch(`https://graph.microsoft.com/v1.0/sites/${u.hostname}:${u.pathname}`,
        { headers: { Authorization: `Bearer ${token}` } });
      if (!sr.ok) throw new Error(`Site not found (${sr.status})`);
      const site = await sr.json();
      const lr = await fetch(
        `https://graph.microsoft.com/v1.0/sites/${site.id}/lists?$filter=displayName eq '${encodeURIComponent(CONFIG.listName)}'`,
        { headers: { Authorization: `Bearer ${token}` } });
      const data = await lr.json();
      if (!data.value?.length) throw new Error(`List "${CONFIG.listName}" not found`);
      return { siteId: site.id, listId: data.value[0].id };
    }

    async function fetchSessionOptions() {
      const r = await fetch('https://loomex-expense.loomex-it.workers.dev/expense-config');
      if (!r.ok) throw new Error('Could not load config (' + r.status + ')');
      const data = await r.json();
      // data.activations = [{ id, name, sites: [{ id, name, jobNumber }] }]
      return data.activations || [];
    }

    async function postItem(siteId, listId, fields, token) {
      const r = await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/${listId}/items`, {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ fields }),
      });
      if (!r.ok) throw new Error(`Graph API ${r.status}: ${await r.text()}`);
      return r.json();
    }

    // ── Helpers ───────────────────────────────────────────────────────────────

    const S_COLOR = { pending:'#aab0be', extracting:'#b45309', ready:'#1a56db', submitting:'#b45309', done:'#1a7a50', error:'#b91c1c', skipped:'#aab0be' };
    const S_LABEL = { pending:'Pending', extracting:'Extracting…', ready:'Ready', submitting:'Submitting…', done:'Done', error:'Error', skipped:'Skipped' };

    // ── App ──────────────────────────────────────────────────────────────────

    function App() {
      const [msalInst,  setMsalInst]  = useState(null);
      const [account,   setAccount]   = useState(null);
      const [authErr,   setAuthErr]   = useState('');
      const [spCache,   setSpCache]   = useState(null); // { siteId, listId }
      const [sessionAct, setSessionActRaw] = useState(sessionStorage.getItem('loomex-activation-id') || '');
      const [sessionHub, setSessionHubRaw] = useState(sessionStorage.getItem('loomex-hub-id') || '');
      const [activations, setActivations] = useState([]); // [{ id, name, sites: [{id, name}] }]
      const [hubOptions,   setHubOptions]   = useState([]); // sites for selected activation
      const [queue,     setQueue]     = useState([]);
      const [activeId,  setActiveId]  = useState(null);
      const [drag,      setDrag]      = useState(false);
      const fileRef = useRef();

      // Persist session values and propagate to all pending/ready queue items
      const setSessionAct = val => {
        setSessionActRaw(val);
        sessionStorage.setItem('loomex-activation-id', val);
        sessionStorage.removeItem('loomex-hub-id');
        setSessionHubRaw('');
        const match = activations.find(a => a.id === val);
        setHubOptions(match ? match.sites || [] : []);
        setQueue(q => q.map(i =>
          ['pending','ready','extracting'].includes(i.status)
            ? { ...i, form: { ...i.form, ActivationID: val, HubID: '' } } : i));
      };
      const setSessionHub = val => {
        setSessionHubRaw(val);
        sessionStorage.setItem('loomex-hub-id', val);
        setQueue(q => q.map(i =>
          ['pending','ready','extracting'].includes(i.status)
            ? { ...i, form: { ...i.form, HubID: val } } : i));
      };

      useEffect(() => {
        (async () => {
          try {
            const inst = new msal.PublicClientApplication({
              auth: {
                clientId: CONFIG.clientId,
                authority: `https://login.microsoftonline.com/${CONFIG.tenantId}`,
                redirectUri: window.location.origin + window.location.pathname,
              },
              cache: { cacheLocation: 'localStorage' },
            });
            await inst.initialize();
            setMsalInst(inst);
            const accounts = inst.getAllAccounts();
            if (accounts.length) {
              setAccount(accounts[0]);
              initSp(inst, accounts[0]);
            }
          } catch (e) { setAuthErr(e.message); }
        })();
      }, []);

      const getTokenFor = async (inst, acct) => {
        try { return (await inst.acquireTokenSilent({ scopes: SCOPES, account: acct })).accessToken; }
        catch { return (await inst.acquireTokenPopup({ scopes: SCOPES, account: acct })).accessToken; }
      };

      const initSp = async (inst, acct) => {
        try {
          const token = await getTokenFor(inst, acct);
          const { siteId, listId } = await resolveSiteList(token);
          setSpCache({ siteId, listId });
        } catch (e) { console.warn('SP resolve:', e.message); }
        try {
          const acts = await fetchSessionOptions();
          setActivations(acts);
          // Restore hub options for previously selected activation
          const savedAct = sessionStorage.getItem('loomex-activation-id');
          if (savedAct) {
            const match = acts.find(a => a.id === savedAct);
            if (match) setHubOptions(match.sites || []);
          }
        } catch (e) { console.warn('Config fetch:', e.message); }
      };

      const signIn = async () => {
        try {
          const r = await msalInst.loginPopup({ scopes: SCOPES });
          setAccount(r.account); setAuthErr('');
          initSp(msalInst, r.account);
        } catch (e) { setAuthErr(e.message); }
      };

      const signOut = () => { msalInst?.logoutPopup({ account }); setAccount(null); setSpCache(null); };

      const getToken = async () => getTokenFor(msalInst, account);

      const upd = (id, patch) => setQueue(q => q.map(i => i.id === id ? { ...i, ...patch } : i));

      const processFile = async (id, file) => {
        upd(id, { status: 'extracting' });
        try {
          let text = '';
          const name = file.name.toLowerCase();
          if (name.endsWith('.docx')) {
            const r = await mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() });
            text = r.value;
          } else if (name.endsWith('.pdf')) {
            const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(await file.arrayBuffer()) }).promise;
            const pages = [];
            for (let p = 1; p <= pdf.numPages; p++) {
              const pg = await pdf.getPage(p);
              const c  = await pg.getTextContent();
              pages.push(c.items.map(i => i.str).join(' '));
            }
            text = pages.join('\n\n');
          } else throw new Error('Only .docx and .pdf are supported');
          const form = extract(text);
          // Apply session values
          form.ActivationID = sessionStorage.getItem('loomex-activation-id') || '';
          form.HubID        = sessionStorage.getItem('loomex-hub-id') || '';
          upd(id, { status: 'ready', rawText: text, form });
        } catch (e) { upd(id, { status: 'error', error: e.message }); }
      };

      const addFiles = files => {
        const items = Array.from(files).map(file => ({
          id: `${Date.now()}-${Math.random().toString(36).slice(2)}`,
          name: file.name, file, status: 'pending', rawText: '', form: {}, error: '',
        }));
        setQueue(q => [...q, ...items]);
        items.forEach(item => processFile(item.id, item.file));
        setActiveId(id => id || items[0]?.id);
      };

      const submitItem = async id => {
        const item = queue.find(i => i.id === id);
        if (!item) return;
        upd(id, { status: 'submitting', error: '' });
        try {
          const token = await getToken();
          let { siteId, listId } = spCache || await resolveSiteList(token);
          const spFields = { RecordStatus: 'Submitted' };
          FIELDS.forEach(({ key, type }) => {
            const v = item.form[key];
            if (v === undefined || v === null || v === '') return;
            spFields[key] = type === 'bool' ? (v === 'true' || v === true) : v;
          });
          if (item.form.ActivationID) spFields.ActivationID = item.form.ActivationID;
          if (item.form.HubID)        spFields.HubID        = item.form.HubID;
          await postItem(siteId, listId, spFields, token);
          upd(id, { status: 'done' });
          const next = queue.find(i => i.id !== id && ['ready','extracting','pending'].includes(i.status));
          if (next) setActiveId(next.id);
        } catch (e) { upd(id, { status: 'error', error: e.message }); }
      };

      const skipItem = id => {
        upd(id, { status: 'skipped' });
        const next = queue.find(i => i.id !== id && ['ready','extracting'].includes(i.status));
        if (next) setActiveId(next.id);
      };

      const setField = (id, key, val) =>
        setQueue(q => q.map(i => i.id === id ? { ...i, form: { ...i.form, [key]: val } } : i));

      const active    = queue.find(i => i.id === activeId);
      const grouped   = GROUPS.map(g => ({ group: g, fields: FIELDS.filter(f => f.group === g) }));
      const doneCount = queue.filter(i => i.status === 'done').length;

      const FieldInput = ({ item, f }) => {
        const val = item?.form?.[f.key] ?? '';
        const set = v => setField(item.id, f.key, v);
        if (f.type === 'textarea') return (
          <textarea rows={f.key.includes('Summary') || f.key.includes('Actions') ? 5 : 3}
            value={val} onChange={e => set(e.target.value)} />
        );
        if (f.type === 'select') return (
          <select value={val} onChange={e => set(e.target.value)}>
            <option value="">— select —</option>
            {f.options.map(o => <option key={o} value={o}>{o}</option>)}
          </select>
        );
        if (f.type === 'bool') return (
          <div className="radio-row">
            {['true','false'].map(v => (
              <label key={v}>
                <input type="radio" name={`${item.id}-${f.key}`} value={v}
                  checked={val === v} onChange={() => set(v)} />
                {v === 'true' ? 'Yes' : 'No'}
              </label>
            ))}
          </div>
        );
        return <input type={f.type || 'text'} value={val} onChange={e => set(e.target.value)} />;
      };

      return (
        <div>
          {/* Top bar */}
          <div className="topbar">
            <div className="topbar-logo" />
            <div>
              <div className="topbar-title">Incident Report Importer</div>
              <div className="topbar-sub">Queue · Review · Import to SharePoint</div>
            </div>
            <div className="topbar-user">
              {authErr && <span className="auth-error">{authErr}</span>}
              {!account && msalInst && <button className="topbar-signin" onClick={signIn}>Sign in with Microsoft</button>}
              {!account && !msalInst && !authErr && <span>Initializing…</span>}
              {account && <><strong>{account.username}</strong><button className="ghost" onClick={signOut}>Sign out</button></>}
            </div>
          </div>

          {/* Session bar -- set once per batch */}
          {account && (
            <div className="session-bar">
              <span className="session-bar-label">Activation</span>
              <input
                className="session-input"
                list="act-options"
                placeholder="Type or select…"
                value={sessionAct}
                onChange={e => setSessionAct(e.target.value)}
              />
              <datalist id="act-options">
                {activations.map(o => <option key={o.id} value={o.id}>{o.name}</option>)}
              </datalist>
              <div className="session-divider" />
              <span className="session-bar-label">Hub</span>
              <input
                className="session-input"
                list="hub-options"
                placeholder="Type or select…"
                value={sessionHub}
                onChange={e => setSessionHub(e.target.value)}
              />
              <datalist id="hub-options">
                {hubOptions.map(o => <option key={o.id} value={o.id}>{o.name}</option>)}
              </datalist>
              <span className="session-bar-hint">
                {activations.length
                  ? `${activations.length} active activations loaded`
                  : 'Loading activations…'}
              </span>
            </div>
          )}

          <div className="main-layout">
            {/* Sidebar */}
            <div>
              <div
                className={`dropzone${drag ? ' drag' : ''}`}
                onClick={() => fileRef.current.click()}
                onDragOver={e => { e.preventDefault(); setDrag(true); }}
                onDragLeave={() => setDrag(false)}
                onDrop={e => { e.preventDefault(); setDrag(false); addFiles(e.dataTransfer.files); }}
              >
                <p style={{fontSize:13,color:'#7a8499',margin:0}}>Drop files or click to add</p>
                <small style={{fontSize:11,color:'#aab0be',display:'block',marginTop:4}}>.docx and .pdf · multiple at once</small>
              </div>
              <input ref={fileRef} type="file" accept=".docx,.pdf" multiple
                style={{display:'none'}} onChange={e => addFiles(e.target.files)} />

              {queue.length > 0 && (
                <div className="card">
                  <div className="card-header">
                    <span className="card-header-title">Queue</span>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <span style={{fontSize:11,color:'#7a8499'}}>{doneCount}/{queue.length}</span>
                      <span className="clear-btn" onClick={() => { setQueue([]); setActiveId(null); }}>Clear</span>
                    </div>
                  </div>
                  {queue.map(item => (
                    <div key={item.id} className={`queue-item${activeId === item.id ? ' active' : ''}`}
                      onClick={() => setActiveId(item.id)}>
                      <div style={{minWidth:0}}>
                        <div className="q-name">{item.name}</div>
                        {item.error && <div className="q-err">{item.error}</div>}
                      </div>
                      <span style={{fontSize:11,color:S_COLOR[item.status],whiteSpace:'nowrap',flexShrink:0}}>
                        {S_LABEL[item.status]}
                      </span>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* Review panel */}
            <div>
              {!active && queue.length === 0 && (
                <div className="card">
                  <div className="empty-state">
                    {!account ? 'Sign in with Microsoft to get started' : 'Upload reports to get started'}
                  </div>
                </div>
              )}

              {active && (
                <div className="review-layout">
                  <div className="card sticky">
                    <div className="card-header">
                      <span className="card-header-title">Extracted text</span>
                      <span style={{fontSize:11,color:'#aab0be'}}>{(active.rawText?.length || 0).toLocaleString()} chars</span>
                    </div>
                    {active.status === 'extracting'
                      ? <div className="center-msg">Extracting…</div>
                      : <pre className="raw-pre">{active.rawText}</pre>}
                  </div>

                  <div>
                    {active.status === 'done' ? (
                      <div className="card">
                        <div className="done-panel">
                          <div className="done-msg">✓ Submitted to SharePoint</div>
                          {queue.some(i => ['ready','extracting','pending'].includes(i.status))
                            ? <button className="primary" onClick={() => {
                                const next = queue.find(i => ['ready','extracting','pending'].includes(i.status));
                                if (next) setActiveId(next.id);
                              }}>Next report →</button>
                            : <div style={{fontSize:13,color:'#1a7a50'}}>All {queue.length} reports submitted</div>}
                        </div>
                      </div>
                    ) : (
                      <>
                        {grouped.map(({ group, fields }) => (
                          <div key={group} className="card">
                            <div className="card-header">
                              <span className="card-header-title">{group}</span>
                              {group === 'Reference' && <span className="badge-warn">Manual fields</span>}
                            </div>
                            <div className="card-body">
                              <div className="grid-2">
                                {fields.map(f => (
                                  <div key={f.key} className={`field-row${f.type === 'textarea' ? ' span-2' : ''}`}>
                                    <label className="field-label">{f.label}</label>
                                    <FieldInput item={active} f={f} />
                                  </div>
                                ))}
                              </div>
                            </div>
                          </div>
                        ))}

                        {active.error && <div className="notice-error">{active.error}</div>}

                        <div className="action-bar">
                          <button className="primary"
                            onClick={() => submitItem(active.id)}
                            disabled={['submitting','extracting'].includes(active.status) || !account}>
                            {active.status === 'submitting' ? 'Submitting…' : 'Submit to SharePoint →'}
                          </button>
                          <button onClick={() => skipItem(active.id)}>Skip</button>
                          {!account && <span className="sign-warn">Sign in first</span>}
                          <span className="progress-note">{doneCount} of {queue.length} submitted</span>
                        </div>
                      </>
                    )}
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
