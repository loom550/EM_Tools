<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOOMI Help</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f4f6f9; min-height: 100vh; display: flex; flex-direction: column; }
    header { background: #1a4e7e; padding: 14px 24px; display: flex; align-items: center; gap: 14px; }
    .logo { color: #7dbe42; font-size: 20px; font-weight: 700; letter-spacing: 1px; }
    .divider { color: #2f9879; font-size: 20px; }
    .module-title { color: #fff; font-size: 16px; }
    .container { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 32px 16px; gap: 16px; }
    .video-wrapper { width: 100%; max-width: 860px; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.12); }
    .video-wrapper iframe { display: block; width: 100%; height: 520px; border: none; }
    .no-video { color: #666; font-size: 15px; margin-top: 40px; }
    footer { text-align: center; padding: 12px; font-size: 12px; color: #999; }
  </style>
</head>
<body>
  <header>
    <span class="logo">LOOMI</span>
    <span class="divider">|</span>
    <span id="title" class="module-title">Help</span>
  </header>
  <div class="container" id="container"></div>
  <footer>LOOMI &mdash; Loomex Response &amp; Readiness Division</footer>
  <script>
    const p = new URLSearchParams(window.location.search);
    const v = p.get('v');
    const t = p.get('t') || 'LOOMI Help';
    document.getElementById('title').textContent = t;
    document.getElementById('container').innerHTML = v
      ? `<div class="video-wrapper"><iframe src="https://embed.app.guidde.com/playbooks/${v}" allowfullscreen allow="autoplay; fullscreen" referrerpolicy="no-referrer-when-downgrade"></iframe></div>`
      : `<p class="no-video">No tutorial video found for this module.</p>`;
  </script>
</body>
</html>
