<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOOMI Scheduler</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --green:#00A651;--green-dim:#007a3d;--navy:#1a3a5c;--navy-light:#234d75;
  --bg:#0d1117;--surface:#161b22;--surface2:#1e2530;--surface3:#252d38;
  --border:#2a3340;--text:#e6edf3;--text-dim:#c0cad6;--text-muted:#6b7a8d;
  --red:#e05252;--yellow:#d4a017;--full:#00A651;--partial:#d4a017;--empty:#e05252;
  --draft:#7aa8d4;--drawer-width:440px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:14px;}
.header{background:var(--navy);padding:0 20px;display:flex;align-items:center;gap:20px;height:52px;border-bottom:2px solid var(--green);flex-shrink:0;}
.logo{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;color:var(--green);letter-spacing:.12em;}
.header-divider{width:1px;height:24px;background:var(--navy-light);}
.activation-badge{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text-dim);letter-spacing:.06em;}
.user-badge{margin-left:auto;display:flex;align-items:center;gap:8px;}
.user-email{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-muted);}
.role-pill{padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;font-family:'IBM Plex Mono',monospace;}
.role-pill.scheduler{background:rgba(0,166,81,.2);color:var(--green);border:1px solid rgba(0,166,81,.4);}
.role-pill.coordinator{background:rgba(212,160,23,.2);color:#d4a017;border:1px solid rgba(212,160,23,.4);}
.role-pill.ic{background:rgba(26,58,92,.6);color:#7aa8d4;border:1px solid var(--navy-light);}
.reload-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:4px 10px;border-radius:4px;font-size:12px;font-family:'IBM Plex Mono',monospace;cursor:pointer;}
.error-bar{background:rgba(224,82,82,.12);border-bottom:1px solid rgba(224,82,82,.3);padding:7px 20px;font-size:13px;color:var(--red);display:none;flex-shrink:0;}
.site-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;flex-shrink:0;}
.site-tab{padding:10px 24px;font-size:13px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;border:none;background:transparent;color:var(--text-dim);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;}
.site-tab.active{color:var(--text);border-bottom-color:var(--green);}
.site-tab:hover:not(.active){color:var(--text);}
.site-tab:disabled{opacity:.3;cursor:not-allowed;}
.site-tab.travel-tab{margin-left:auto;border-left:1px solid var(--border);}
.week-nav{display:flex;align-items:center;gap:12px;padding:8px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.week-nav button{background:var(--surface2);border:1px solid var(--border);color:var(--text);width:28px;height:28px;border-radius:4px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.week-label{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text-dim);letter-spacing:.06em;}
.legend{margin-left:auto;display:flex;gap:16px;align-items:center;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text-dim);}
.legend-dot{width:8px;height:8px;border-radius:50%;}
.role-bar{display:flex;align-items:center;gap:8px;padding:6px 20px;background:var(--surface2);border-bottom:1px solid var(--border);flex-shrink:0;}
.role-bar label{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;}
.role-bar select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:4px 10px;border-radius:4px;font-size:13px;font-family:'IBM Plex Sans',sans-serif;cursor:pointer;min-width:240px;}
.add-role-btn{background:var(--green);border:none;color:#fff;padding:5px 14px;border-radius:4px;font-size:12px;font-weight:600;cursor:pointer;}
.ic-banner{display:none;align-items:center;gap:10px;padding:7px 20px;background:rgba(26,58,92,.4);border-bottom:1px solid var(--navy-light);flex-shrink:0;font-size:12px;color:#7aa8d4;}
.grid-wrapper{flex:1;overflow:auto;position:relative;}
.grid-table{border-collapse:collapse;width:max-content;min-width:100%;}
.role-col{position:sticky;left:0;z-index:10;background:var(--surface);width:210px;min-width:210px;}
.role-header-cell{position:sticky;left:0;top:0;z-index:20;background:var(--surface);padding:10px 16px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--text-muted);text-transform:uppercase;border-right:2px solid var(--border);border-bottom:1px solid var(--border);}
thead th{position:sticky;top:0;z-index:5;background:var(--surface2);border-bottom:1px solid var(--border);border-right:1px solid var(--border);}
.date-header{padding:8px 4px 6px;text-align:center;min-width:80px;}
.date-dow{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);display:block;margin-bottom:2px;}
.date-num{font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:600;color:var(--text);display:block;}
.date-mon{font-size:10px;color:var(--text-dim);display:block;margin-top:1px;}
.date-header.today .date-num{color:var(--green);}
.shift-section-row td{padding:5px 16px;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;border-bottom:1px solid var(--border);}
.shift-section-row.day-section td{background:rgba(212,160,23,.08);color:#d4a017;border-left:3px solid #d4a017;}
.shift-section-row.night-section td{background:rgba(26,58,92,.5);color:#7aa8d4;border-left:3px solid #7aa8d4;}
.shift-section-row td.role-col{background:inherit;}
.role-cell-inner{padding:0 10px 0 14px;height:50px;border-right:2px solid var(--border);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:4px;}
.role-cell-inner.day-row{border-left:3px solid rgba(212,160,23,.4);}
.role-cell-inner.night-row{border-left:3px solid rgba(122,168,212,.4);}
.role-name-wrap{flex:1;min-width:0;cursor:pointer;}
.role-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;}
.role-req{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:4px;margin-top:2px;}
.req-edit{background:var(--surface2);border:1px solid var(--border);color:var(--text);width:36px;padding:1px 4px;border-radius:3px;font-size:11px;font-family:'IBM Plex Mono',monospace;text-align:center;}
.remove-role-btn{background:transparent;border:none;color:var(--text-muted);cursor:pointer;font-size:16px;padding:2px 4px;border-radius:3px;opacity:0;transition:opacity .15s,color .15s;flex-shrink:0;}
tr:hover .remove-role-btn{opacity:1;}
.remove-role-btn:hover{color:var(--red);}
.slot-cell{border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:3px;cursor:pointer;min-width:80px;transition:filter .1s;}
.slot-cell:hover{filter:brightness(1.3);}
.slot-cell.readonly{cursor:default;}
.slot-cell.readonly:hover{filter:none;}
.slot-inner{border-radius:4px;height:44px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;}
.slot-count{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;}
.slot-label{font-size:10px;letter-spacing:.04em;text-transform:uppercase;opacity:.75;}
.slot-draft-indicator{font-size:9px;color:var(--draft);opacity:.85;}
.slot-inner.full{background:rgba(0,166,81,.13);border:1px solid rgba(0,166,81,.32);}
.slot-inner.full .slot-count{color:var(--full);}
.slot-inner.partial{background:rgba(212,160,23,.1);border:1px solid rgba(212,160,23,.28);}
.slot-inner.partial .slot-count{color:var(--partial);}
.slot-inner.empty{background:rgba(224,82,82,.08);border:1px solid rgba(224,82,82,.22);}
.slot-inner.empty .slot-count{color:var(--empty);}
.loading-overlay{position:absolute;inset:0;background:rgba(13,17,23,.85);display:flex;align-items:center;justify-content:center;z-index:50;flex-direction:column;gap:12px;}
.loading-overlay.hidden{opacity:0;pointer-events:none;}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text-dim);letter-spacing:.08em;}
.summary-bar{padding:6px 20px;background:var(--surface);border-top:1px solid var(--border);display:flex;gap:20px;flex-shrink:0;align-items:center;}
.summary-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-dim);}
.summary-dot{width:7px;height:7px;border-radius:50%;}
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;opacity:0;pointer-events:none;transition:opacity .2s;}
.drawer-overlay.open{opacity:1;pointer-events:all;}
.drawer{position:fixed;right:0;top:0;bottom:0;width:var(--drawer-width);background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .22s cubic-bezier(.4,0,.2,1);z-index:201;}
.drawer.open{transform:translateX(0);}
.drawer-header{padding:16px 20px;border-bottom:1px solid var(--border);background:var(--navy);flex-shrink:0;position:relative;}
.drawer-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:5px;}
.drawer-meta{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-dim);letter-spacing:.06em;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.shift-badge{padding:2px 8px;border-radius:3px;font-size:10px;font-weight:600;}
.shift-badge.day{background:rgba(212,160,23,.3);color:#d4a017;}
.shift-badge.night{background:rgba(26,58,92,.8);color:#7aa8d4;}
.site-badge{background:var(--surface3);border:1px solid var(--border);color:var(--text-dim);padding:2px 8px;border-radius:3px;font-size:10px;}
.drawer-close{position:absolute;top:14px;right:16px;background:transparent;border:none;color:var(--text-dim);cursor:pointer;font-size:20px;line-height:1;padding:4px;border-radius:4px;}
.drawer-body{flex:1;overflow-y:auto;padding:16px;}
.drawer-section-label{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;margin-top:16px;}
.drawer-section-label:first-child{margin-top:0;}
.assigned-card{background:var(--surface2);border:1px solid rgba(0,166,81,.2);border-radius:6px;padding:12px;margin-bottom:8px;}
.assigned-card.draft{border-color:rgba(122,168,212,.25);background:rgba(26,58,92,.12);}
.assigned-card-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.assigned-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px;}
.assigned-sub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-muted);display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.draft-badge{background:rgba(122,168,212,.15);border:1px solid rgba(122,168,212,.3);color:var(--draft);padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600;}
.confirmed-badge{background:rgba(0,166,81,.15);border:1px solid rgba(0,166,81,.3);color:var(--green);padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600;}
.date-range-editor{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.date-range-editor label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text-muted);text-transform:uppercase;display:block;margin-bottom:3px;}
.date-range-editor input{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:4px;font-size:13px;width:100%;}
.avail-windows{font-size:12px;color:var(--text-dim);margin-bottom:10px;padding:7px 10px;background:var(--surface3);border-radius:4px;border:1px solid var(--border);line-height:1.5;}
.avail-windows strong{color:var(--green);}
.avail-remaining{color:var(--yellow);}
.card-actions{display:flex;gap:6px;flex-wrap:wrap;}
.person-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:5px;margin-bottom:5px;background:var(--surface2);border:1px solid var(--border);}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:var(--green);flex-shrink:0;}
.person-info{flex:1;min-width:0;}
.person-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.person-sub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-muted);display:flex;gap:5px;margin-top:3px;flex-wrap:wrap;align-items:center;}
.avail-range-tag{background:rgba(0,166,81,.1);border:1px solid rgba(0,166,81,.2);color:#6dcc99;padding:1px 6px;border-radius:3px;font-size:10px;}
.night-badge{background:rgba(26,58,92,.8);border:1px solid var(--navy-light);color:#7aa8d4;padding:0 6px;border-radius:3px;font-size:10px;font-weight:600;}
.role-tag{background:var(--surface3);border:1px solid var(--border);color:var(--text-dim);padding:0 6px;border-radius:3px;font-size:10px;}
.btn{padding:5px 12px;border-radius:4px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s;border:none;flex-shrink:0;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-green{background:var(--green);color:#fff;}
.btn-green:hover:not(:disabled){background:var(--green-dim);}
.btn-outline{background:transparent;color:var(--text-muted);border:1px solid var(--border);}
.btn-outline:hover:not(:disabled){color:var(--red);border-color:var(--red);}
.btn-confirm{background:rgba(0,166,81,.15);color:var(--green);border:1px solid rgba(0,166,81,.3);}
.btn-confirm:hover:not(:disabled){background:rgba(0,166,81,.25);}
.btn-navy{background:rgba(26,58,92,.5);color:#7aa8d4;border:1px solid var(--navy-light);}
.btn-navy:hover:not(:disabled){background:var(--navy);}
.detail-card{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:12px;margin-bottom:8px;}
.detail-card-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;margin-bottom:10px;}
.detail-field{font-size:12px;}
.detail-label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:2px;}
.detail-value{color:var(--text);}
.detail-value a{color:var(--green);text-decoration:none;}
.inline-select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:4px;font-size:12px;font-family:'IBM Plex Sans',sans-serif;width:100%;cursor:pointer;}
.empty-state{text-align:center;padding:28px 0;color:var(--text-muted);font-size:13px;}
/* COORD VIEW */
.coord-view{display:none;flex:1;overflow-y:auto;padding:20px;flex-direction:column;gap:12px;background:var(--bg);}
.coord-view.active{display:flex;}
.coord-filter-bar{display:none;flex;gap:10px;align-items:center;padding:8px 20px;background:var(--surface2);border-bottom:1px solid var(--border);flex-shrink:0;}
.coord-filter-bar.active{display:flex;}
.coord-filter-bar select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:4px 10px;border-radius:4px;font-size:12px;font-family:'IBM Plex Sans',sans-serif;cursor:pointer;}
.coord-filter-bar label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text-muted);text-transform:uppercase;}
.coord-card{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:14px;}
.coord-card.confirmed{border-color:rgba(0,166,81,.3);}
.coord-card-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.coord-card-name{font-size:14px;font-weight:600;color:var(--text);}
.coord-card-meta{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text-muted);display:flex;gap:8px;flex-wrap:wrap;margin-top:3px;align-items:center;}
.coord-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.coord-field label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text-muted);text-transform:uppercase;display:block;margin-bottom:3px;}
.coord-field input{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:4px;font-size:12px;width:100%;font-family:'IBM Plex Sans',sans-serif;}
.coord-field input:focus{outline:1px solid var(--green);}
.coord-field.full{grid-column:1/-1;}
.coord-check{display:flex;align-items:center;gap:8px;}
.coord-check input[type=checkbox]{width:16px;height:16px;accent-color:var(--green);cursor:pointer;}
.grid-wrapper::-webkit-scrollbar,.drawer-body::-webkit-scrollbar{width:8px;height:8px;}
.grid-wrapper::-webkit-scrollbar-track,.drawer-body::-webkit-scrollbar-track{background:var(--bg);}
.grid-wrapper::-webkit-scrollbar-thumb,.drawer-body::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px;}
</style>
</head>
<body>
<div class="header">
  <div class="logo">LOOMI &mdash; Scheduler</div>
  <div class="header-divider"></div>
  <div class="activation-badge">2026-KASH-HUBHOST</div>
  <div class="user-badge">
    <span class="user-email" id="user-email"></span>
    <span class="role-pill" id="role-pill"></span>
    <button class="reload-btn" onclick="loadData()">&#8635; Refresh</button>
  </div>
</div>
<div id="error-bar" class="error-bar"></div>
<div id="ic-banner" class="ic-banner"><span>&#128274; Read-only view. You can edit Hotel and Role Assigned for your site.</span></div>
<div class="site-tabs" id="site-tabs">
  <button class="site-tab active" id="tab-Kingston" onclick="setSite('Kingston',this)">Kingston</button>
  <button class="site-tab" id="tab-Kapuskasing" onclick="setSite('Kapuskasing',this)">Kapuskasing</button>
  <button class="site-tab" id="tab-Timmins" onclick="setSite('Timmins',this)">Timmins</button>
  <button class="site-tab travel-tab" id="tab-travel" onclick="enterCoordView(this)">&#9992; Travel</button>
</div>
<div class="week-nav" id="week-nav">
  <button onclick="shiftWeek(-1)">&#8249;</button>
  <span class="week-label" id="week-label"></span>
  <button onclick="shiftWeek(1)">&#8250;</button>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--full)"></div>Full</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--partial)"></div>Partial</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--empty)"></div>Gap</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--draft)"></div>Draft</div>
  </div>
</div>
<div class="role-bar" id="role-bar">
  <label>Add Position:</label>
  <select id="role-picker"></select>
  <button class="add-role-btn" onclick="addRoleToGrid()">+ Add</button>
</div>
<div class="coord-filter-bar" id="coord-filter-bar">
  <label>Site:</label>
  <select id="coord-site-filter" onchange="renderCoordView()">
    <option value="">All Sites</option>
    <option value="Kingston">Kingston</option>
    <option value="Kapuskasing">Kapuskasing</option>
    <option value="Timmins">Timmins</option>
  </select>
  <label style="margin-left:12px">Show:</label>
  <select id="coord-status-filter" onchange="renderCoordView()">
    <option value="confirmed">Confirmed Only</option>
    <option value="all">All Assignments</option>
  </select>
</div>
<div class="grid-wrapper" id="grid-wrapper">
  <div class="loading-overlay" id="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text" id="loading-text">Signing in...</div>
  </div>
  <table class="grid-table" id="sched-grid"></table>
</div>
<div class="coord-view" id="coord-view"></div>
<div class="summary-bar" id="summary-bar"></div>
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <button class="drawer-close" onclick="closeDrawer()">&#10005;</button>
    <div class="drawer-title" id="drawer-title"></div>
    <div class="drawer-meta" id="drawer-meta"></div>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</div>
<script>
var WORKER = 'https://evacscheduling.loomex-it.workers.dev';
var currentUser = null;
var contractors = [];
var availability = [];
var assignments = [];
var hotels = [];
var allRoles = [];
var activeRoles = [];
var roleReqs = {};
var currentSite = 'Kingston';
var weekOffset = 0;
var drawerState = null;
var coordMode = false;

var BASE_DATE = new Date('2026-03-24T00:00:00');
var TODAY_STR = new Date().toISOString().slice(0,10);
var DOW = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
var MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function dateStr(d) { return d.toISOString().slice(0,10); }
function isInRange(ds,s,e) { return ds>=s && ds<=e; }
function fmtDate(ds) {
  if (!ds) return '-';
  var d = new Date(ds+'T00:00:00');
  return MON[d.getMonth()]+' '+d.getDate();
}
function getWeekDates() {
  var out = [];
  for (var i=0;i<7;i++) {
    var d = new Date(BASE_DATE);
    d.setDate(d.getDate()+weekOffset*7+i);
    out.push(d);
  }
  return out;
}

async function api(path, opts) {
  opts = opts || {};
  var res = await fetch(WORKER+path, Object.assign({credentials:'include',headers:{'Content-Type':'application/json'}}, opts));
  if (res.redirected && res.url.indexOf('cloudflareaccess.com')>-1) { window.location.href=res.url; throw new Error('login'); }
  if (res.status===401||res.status===403) { window.location.href='https://evacscheduling.cloudflareaccess.com/cdn-cgi/access/login/evacscheduling.loomex-it.workers.dev?redirectUrl='+encodeURIComponent(window.location.href); throw new Error('login'); }
  var data = await res.json();
  if (!res.ok) throw new Error(data.error||('HTTP '+res.status));
  return data;
}

function showError(msg) {
  var b=document.getElementById('error-bar');
  b.textContent=msg; b.style.display='block';
  setTimeout(function(){b.style.display='none';},7000);
}
function setLoading(on,msg) {
  document.getElementById('loading-overlay').classList.toggle('hidden',!on);
  if (msg) document.getElementById('loading-text').textContent=msg;
}

async function init() {
  setLoading(true,'Signing in...');
  try {
    currentUser = await api('/me');
    applyRole();
    await loadRoles();
    await loadData();
  } catch(e) {
    if (e.message!=='login') { showError('Sign-in failed: '+e.message); setLoading(false); }
  }
}

function applyRole() {
  document.getElementById('user-email').textContent = currentUser.email;
  var pill = document.getElementById('role-pill');
  var roleLabel = {scheduler:'SCHEDULER',coordinator:'COORDINATOR',ic:'IC'}[currentUser.role]||'IC';
  pill.textContent = roleLabel;
  pill.className = 'role-pill '+currentUser.role;
  if (currentUser.role==='coordinator') {
    document.getElementById('role-bar').style.display='none';
  }
  if (currentUser.role==='ic') {
    document.getElementById('role-bar').style.display='none';
    document.getElementById('ic-banner').style.display='flex';
    var cities = currentUser.cities||[];
    ['Kingston','Kapuskasing','Timmins'].forEach(function(city){
      var t=document.getElementById('tab-'+city);
      if (t && cities.indexOf(city)===-1) t.disabled=true;
    });
    if (cities.length>0) {
      currentSite=cities[0];
      document.querySelectorAll('.site-tab').forEach(function(t){t.classList.remove('active');});
      var at=document.getElementById('tab-'+currentSite);
      if (at) at.classList.add('active');
    }
  }
}

async function loadRoles() {
  try {
    allRoles = await api('/roles');
    activeRoles = allRoles.slice();
    allRoles.forEach(function(r){ if (!roleReqs[r]) roleReqs[r]=1; });
    populateRolePicker();
  } catch(e) { showError('Could not load roles: '+e.message); }
}

async function loadData() {
  setLoading(true,'Loading...');
  try {
    var dates=getWeekDates();
    var start=dateStr(dates[0]), end=dateStr(dates[6]);
    var results = await Promise.all([
      api('/availability?start='+start+'&end='+end),
      api('/assignments?location='+encodeURIComponent(currentSite)+'&start='+start+'&end='+end),
      api('/hotels?city='+encodeURIComponent(currentSite)).catch(function(){return [];}),
    ]);
    availability=results[0]; assignments=results[1]; hotels=results[2];
    if (contractors.length===0) contractors=await api('/contractors');
    renderGrid();
    if (coordMode) renderCoordView();
    if (drawerState) renderDrawer();
  } catch(e) { showError('Load failed: '+e.message); }
  finally { setLoading(false); }
}

function getAvailDates(c) {
  var avail=availability.find(function(a){return a.contractorRef===c.recordId||a.contractorRef===c.contractorId;});
  if (!avail) return [];
  var out=[];
  avail.windows.forEach(function(w){
    var cur=new Date(w.start+'T00:00:00'), end=new Date(w.end+'T00:00:00');
    while(cur<=end){out.push(dateStr(cur));cur.setDate(cur.getDate()+1);}
  });
  return out;
}
function getAssignedDates(cid) {
  var out=[];
  assignments.filter(function(a){return a.contractorRecordId===cid && a.roleAssigned;}).forEach(function(a){
    var cur=new Date(a.startDate+'T00:00:00'),end=new Date(a.endDate+'T00:00:00');
    while(cur<=end){out.push(dateStr(cur));cur.setDate(cur.getDate()+1);}
  });
  return out;
}
function isAvailOn(c,ds,shift) {
  if (shift==='night'&&!c.nightOk) return false;
  var avail=availability.find(function(a){return a.contractorRef===c.recordId||a.contractorRef===c.contractorId;});
  if (!avail) return false;
  return avail.windows.some(function(w){return isInRange(ds,w.start,w.end);});
}
function getRemainingDates(c) {
  var all=getAvailDates(c), asgn=getAssignedDates(c.recordId);
  var asgnSet={};asgn.forEach(function(d){asgnSet[d]=1;});
  return all.filter(function(d){return !asgnSet[d];});
}
function getAssignedOn(site,role,shift,ds) {
  return assignments.filter(function(a){
    return (a.location===site||a.location===''||!a.location) &&
      a.roleAssigned===role &&
      a.shift===(shift==='day'?'Day':'Night') &&
      isInRange(ds,a.startDate,a.endDate);
  });
}

function populateRolePicker() {
  if (!currentUser||currentUser.role!=='scheduler') return;
  var sel=document.getElementById('role-picker');
  var avail=allRoles.filter(function(r){return activeRoles.indexOf(r)===-1;});
  sel.innerHTML=avail.length?avail.map(function(r){return '<option value="'+r+'">'+r+'</option>';}).join(''):'<option disabled>All added</option>';
  sel.disabled=avail.length===0;
}
function addRoleToGrid() {
  var val=document.getElementById('role-picker').value;
  if (val&&activeRoles.indexOf(val)===-1){activeRoles.push(val);if(!roleReqs[val])roleReqs[val]=1;populateRolePicker();renderGrid();}
}
function removeRoleFromGrid(r) {
  activeRoles=activeRoles.filter(function(x){return x!==r;});
  populateRolePicker();renderGrid();
}
function updateReq(r,v) {
  var n=parseInt(v);if(!isNaN(n)&&n>0){roleReqs[r]=n;renderGrid();}
}
function toggleReqEdit(r,sh) {
  if (!currentUser||currentUser.role!=='scheduler') return;
  var rid=r.replace(/[^a-zA-Z0-9]/g,'_');
  var inp=document.getElementById('req-input-'+rid+'-'+sh);
  var lbl=document.getElementById('req-label-'+rid+'-'+sh);
  if (!inp||!lbl) return;
  lbl.style.display='none';inp.style.display='inline-block';inp.focus();inp.select();
}
function hideReqEdit(rid,sh) {
  var inp=document.getElementById('req-input-'+rid+'-'+sh);
  var lbl=document.getElementById('req-label-'+rid+'-'+sh);
  if (!inp||!lbl) return;
  lbl.textContent='Req: '+(roleReqs[rid.replace(/_/g,' ')]||1)+'/shift';
  lbl.style.display='inline';inp.style.display='none';
}

function renderGrid() {
  var dates=getWeekDates();
  var d0=dates[0],d6=dates[6];
  document.getElementById('week-label').textContent=
    MON[d0.getMonth()].toUpperCase()+' '+d0.getDate()+' \u2013 '+
    MON[d6.getMonth()].toUpperCase()+' '+d6.getDate()+', '+d6.getFullYear();
  var isIC=currentUser&&currentUser.role==='ic';
  var html='<thead><tr><th class="role-header-cell role-col">POSITION</th>';
  dates.forEach(function(d){
    var ds=dateStr(d);
    html+='<th><div class="date-header'+(ds===TODAY_STR?' today':'')+'">'+
      '<span class="date-dow">'+DOW[d.getDay()]+'</span>'+
      '<span class="date-num">'+d.getDate()+'</span>'+
      '<span class="date-mon">'+MON[d.getMonth()]+'</span>'+
      '</div></th>';
  });
  html+='</tr></thead><tbody>';
  var total=0,filled=0,gaps=0,drafts=0;
  ['day','night'].forEach(function(shift){
    html+='<tr class="shift-section-row '+shift+'-section"><td class="role-col" colspan="'+(dates.length+1)+'">'+
      (shift==='day'?'&#9728; DAY SHIFT (12hr)':'&#9790; NIGHT SHIFT (12hr)')+
      '</td></tr>';
    activeRoles.forEach(function(roleName){
      var req=roleReqs[roleName]||1;
      var rid=roleName.replace(/[^a-zA-Z0-9]/g,'_');
      html+='<tr><td class="role-col"><div class="role-cell-inner '+shift+'-row">'+
        '<div class="role-name-wrap" onclick="toggleReqEdit('+JSON.stringify(roleName)+','+JSON.stringify(shift)+')">'+
        '<span class="role-name">'+roleName+'</span>'+
        '<div class="role-req">'+
        '<span id="req-label-'+rid+'-'+shift+'">Req: '+req+'/shift</span>'+
        '<input type="number" id="req-input-'+rid+'-'+shift+'" class="req-edit" value="'+req+'" min="1" max="20" style="display:none"'+
        ' onchange="updateReq('+JSON.stringify(roleName)+',this.value)"'+
        ' onblur="hideReqEdit('+JSON.stringify(rid)+','+JSON.stringify(shift)+')"'+
        ' onclick="event.stopPropagation()">'+
        '</div></div>'+
        (isIC?'':'<button class="remove-role-btn" onclick="removeRoleFromGrid('+JSON.stringify(roleName)+')" title="Remove">&#215;</button>')+
        '</div></td>';
      dates.forEach(function(d){
        var ds=dateStr(d);
        var asgnd=getAssignedOn(currentSite,roleName,shift,ds);
        var count=asgnd.length, draftCt=asgnd.filter(function(a){return !a.confirmed;}).length;
        total++;
        if(count>=req)filled++;else if(count===0)gaps++;
        if(draftCt>0)drafts++;
        var status=count>=req?'full':count>0?'partial':'empty';
        var lbl=count>=req?'staffed':count>0?'partial':'gap';
        html+='<td class="slot-cell'+(isIC?' readonly':'')+'" data-role="'+roleName.replace(/"/g,'&quot;')+'" data-date="'+ds+'" data-shift="'+shift+'" onclick="'+
          (isIC?'openDrawerIC':'openDrawer')+'(this.dataset.role,this.dataset.date,this.dataset.shift)">'+
          '<div class="slot-inner '+status+'">'+
          '<span class="slot-count">'+count+'/'+req+'</span>'+
          '<span class="slot-label">'+lbl+'</span>'+
          (draftCt>0?'<span class="slot-draft-indicator">'+draftCt+' draft</span>':'')+
          '</div></td>';
      });
      html+='</tr>';
    });
  });
  html+='</tbody>';
  document.getElementById('sched-grid').innerHTML=html;
  var partial=total-filled-gaps;
  document.getElementById('summary-bar').innerHTML=
    '<div class="summary-item"><div class="summary-dot" style="background:var(--full)"></div>'+filled+' full</div>'+
    '<div class="summary-item"><div class="summary-dot" style="background:var(--partial)"></div>'+partial+' partial</div>'+
    '<div class="summary-item"><div class="summary-dot" style="background:var(--empty)"></div>'+gaps+' gaps</div>'+
    '<div class="summary-item"><div class="summary-dot" style="background:var(--draft)"></div>'+drafts+' drafts</div>'+
    '<div class="summary-item" style="margin-left:auto;font-family:\'IBM Plex Mono\',monospace;font-size:11px;color:var(--text-muted)">'+currentSite+' | '+activeRoles.length+' positions</div>';
}

function openDrawer(role,ds,shift) {
  drawerState={roleName:role,dateStr:ds,shift:shift};
  renderDrawer();
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
}

function renderDrawer() {
  if (!drawerState) return;
  var role=drawerState.roleName, ds=drawerState.dateStr, shift=drawerState.shift;
  var d=new Date(ds+'T00:00:00'), req=roleReqs[role]||1;
  document.getElementById('drawer-title').textContent=role;
  document.getElementById('drawer-meta').innerHTML=
    '<span>'+DOW[d.getDay()]+', '+MON[d.getMonth()]+' '+d.getDate()+'</span>'+
    '<span class="shift-badge '+shift+'">'+shift.toUpperCase()+' SHIFT</span>'+
    '<span class="site-badge">'+currentSite+'</span>';
  var asgndRecs=getAssignedOn(currentSite,role,shift,ds);
  var asgndIds={};asgndRecs.forEach(function(a){asgndIds[a.contractorRecordId]=1;});
  var availCtrs=contractors.filter(function(c){
    if (!isAvailOn(c,ds,shift)) return false;
    if (asgndIds[c.recordId]) return false;
    var adates=getAssignedDates(c.recordId);
    return adates.indexOf(ds)===-1;
  });
  var html='<div class="drawer-section-label">Assigned ('+asgndRecs.length+'/'+req+')</div>';
  if (asgndRecs.length===0) {
    html+='<div class="empty-state">No one assigned</div>';
  } else {
    asgndRecs.forEach(function(rec){
      var c=contractors.find(function(x){return x.recordId===rec.contractorRecordId;});
      if (!c) return;
      var rem=getRemainingDates(c), isDraft=!rec.confirmed, rid=rec.recordId;
      html+='<div class="assigned-card'+(isDraft?' draft':'')+'">'+
        '<div class="assigned-card-top">'+
        '<div class="avatar">'+c.initials+'</div>'+
        '<div style="flex:1;min-width:0">'+
        '<div class="assigned-name">'+c.name+'</div>'+
        '<div class="assigned-sub">'+
        (c.contractorRole?'<span class="role-tag">'+c.contractorRole.split(',')[0].trim()+'</span>':'')+
        (isDraft?'<span class="draft-badge">DRAFT</span>':'<span class="confirmed-badge">CONFIRMED</span>')+
        (c.nightOk?'<span class="night-badge">NIGHTS OK</span>':'')+
        '</div></div></div>'+
        '<div class="avail-windows">Deployed: <strong>'+fmtDate(rec.startDate)+' &rarr; '+fmtDate(rec.endDate)+'</strong>'+
        (rem.length>0?'&nbsp;&nbsp;<span class="avail-remaining">&#9650; '+rem.length+' day'+(rem.length!==1?'s':'')+' still available</span>':'')+
        '</div>'+
        '<div class="date-range-editor">'+
        '<div><label>Start Date</label><input type="date" id="start-'+rid+'" value="'+rec.startDate+'"></div>'+
        '<div><label>End Date</label><input type="date" id="end-'+rid+'" value="'+rec.endDate+'"></div>'+
        '</div>'+
        '<div class="card-actions">'+
        '<button class="btn btn-navy" id="save-btn-'+rid+'">Save Dates</button>'+
        (isDraft?'<button class="btn btn-confirm" id="confirm-btn-'+rid+'">&#10003; Confirm</button>':'')+
        '<button class="btn btn-outline" id="remove-btn-'+rid+'">Remove</button>'+
        '</div></div>';
    });
  }
  html+='<div class="drawer-section-label" style="margin-top:20px">Available ('+availCtrs.length+')</div>';
  if (availCtrs.length===0) {
    html+='<div class="empty-state">No contractors available</div>';
  } else {
    availCtrs.forEach(function(c){
      var avail=availability.find(function(a){return a.contractorRef===c.recordId||a.contractorRef===c.contractorId;});
      var win=avail&&avail.windows.find(function(w){return isInRange(ds,w.start,w.end);});
      var rem=getRemainingDates(c);
      html+='<div class="person-row">'+
        '<div class="avatar">'+c.initials+'</div>'+
        '<div class="person-info">'+
        '<div class="person-name">'+c.name+'</div>'+
        '<div class="person-sub">'+
        (c.contractorRole?'<span class="role-tag">'+c.contractorRole.split(',')[0].trim()+'</span>':'')+
        (c.nightOk?'<span class="night-badge">NIGHTS OK</span>':'<span style="color:var(--text-muted)">Day only</span>')+
        (win?'<span class="avail-range-tag">'+fmtDate(win.start)+'&ndash;'+fmtDate(win.end)+'</span>':'')+
        (rem.length>0?'<span style="color:var(--text-dim);font-size:10px">'+rem.length+'d avail</span>':'')+
        (c.address?'<span style="color:var(--text-muted);font-size:10px">&#128205; '+c.address.split(',').slice(-2).join(',').trim()+'</span>':'')+
        '</div></div>'+
        '<button class="btn btn-green" id="assign-btn-'+c.recordId+'">Assign</button>'+
        '</div>';
    });
  }
  document.getElementById('drawer-body').innerHTML=html;
  // Attach events via addEventListener - no inline onclick needed
  asgndRecs.forEach(function(rec){
    var rid=rec.recordId;
    var saveBtn=document.getElementById('save-btn-'+rid);
    var confirmBtn=document.getElementById('confirm-btn-'+rid);
    var removeBtn=document.getElementById('remove-btn-'+rid);
    if (saveBtn) saveBtn.addEventListener('click',function(){doSaveRange(rid,this);});
    if (confirmBtn) confirmBtn.addEventListener('click',function(){doConfirm(rid,this);});
    if (removeBtn) removeBtn.addEventListener('click',function(){doRemove(rid,this);});
  });
  availCtrs.forEach(function(c){
    var avail=availability.find(function(a){return a.contractorRef===c.recordId||a.contractorRef===c.contractorId;});
    var win=avail&&avail.windows.find(function(w){return isInRange(ds,w.start,w.end);});
    var btn=document.getElementById('assign-btn-'+c.recordId);
    if (btn) {
      var autoStart=win?win.start:ds, autoEnd=win?win.end:ds;
      btn.addEventListener('click',function(){doAssign(c.recordId,autoStart,autoEnd,this);});
    }
  });
}

async function doAssign(cid,autoStart,autoEnd,btn) {
  btn.disabled=true;btn.textContent='...';
  var role=drawerState.roleName, shift=drawerState.shift;
  try {
    var result=await api('/assignments',{method:'POST',body:JSON.stringify({
      contractorRecordId:cid,location:currentSite,
      startDate:autoStart,endDate:autoEnd,
      roleAssigned:role,shift:shift==='day'?'Day':'Night'
    })});
    assignments.push({recordId:result.id,contractorRecordId:cid,location:currentSite,
      startDate:autoStart,endDate:autoEnd,roleAssigned:role,
      shift:shift==='day'?'Day':'Night',status:'Draft',confirmed:false,
      hotel:'',travelRequired:false,travelArrival:'',travelDeparture:'',
      travelBooked:false,bookingReference:'',travelNotes:''});
    renderDrawer();renderGrid();
  } catch(e){showError('Assign failed: '+e.message);btn.disabled=false;btn.textContent='Assign';}
}
async function doSaveRange(rid,btn) {
  btn.disabled=true;btn.textContent='...';
  var s=document.getElementById('start-'+rid), e=document.getElementById('end-'+rid);
  if (!s||!e){btn.disabled=false;btn.textContent='Save Dates';return;}
  try {
    await api('/assignments/'+rid,{method:'PATCH',body:JSON.stringify({startDate:s.value,endDate:e.value,location:currentSite})});
    var rec=assignments.find(function(a){return a.recordId===rid;});
    if(rec){rec.startDate=s.value;rec.endDate=e.value;}
    btn.innerHTML='Saved &#10003;';
    setTimeout(function(){btn.disabled=false;btn.innerHTML='Save Dates';},1500);
    renderGrid();
  } catch(e){showError('Save failed: '+e.message);btn.disabled=false;btn.textContent='Save Dates';}
}
async function doConfirm(rid,btn) {
  btn.disabled=true;btn.textContent='...';
  try {
    await api('/assignments/'+rid+'/confirm',{method:'POST'});
    var rec=assignments.find(function(a){return a.recordId===rid;});
    if(rec){rec.confirmed=true;rec.status='Active';}
    renderDrawer();renderGrid();
  } catch(e){showError('Confirm failed: '+e.message);btn.disabled=false;btn.innerHTML='&#10003; Confirm';}
}
async function doRemove(rid,btn) {
  btn.disabled=true;btn.textContent='...';
  try {
    await api('/assignments/'+rid,{method:'DELETE'});
    assignments=assignments.filter(function(a){return a.recordId!==rid;});
    renderDrawer();renderGrid();
  } catch(e){showError('Remove failed: '+e.message);btn.disabled=false;btn.textContent='Remove';}
}

        '<div class="detail-field"><span class="detail-label">Booking Ref</span><span class="detail-value">'+(rec.bookingReference||'-')+'</span></div>'+
        '<div class="detail-field"><span class="detail-label">Travel Booked</span><span class="detail-value">'+(rec.travelBooked?'&#10003; Yes':'No')+'</span></div>'+
        '</div>'+
        '<div style="margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px">'+
        '<div><span class="detail-label">Hotel</span><select class="inline-select" id="ic-hotel-'+rec.recordId+'"><option value="">Not set</option>'+hotelOpts+'</select></div>'+
        '<div><span class="detail-label">Role Assigned</span><select class="inline-select" id="ic-role-'+rec.recordId+'">'+roleOpts+'</select></div>'+
        '</div>'+
        '<div style="margin-top:10px"><button class="btn btn-green" id="ic-save-'+rec.recordId+'">Save Changes</button></div>'+
        '</div>';
    });
  }
  document.getElementById('drawer-body').innerHTML=html;
  asgndRecs.forEach(function(rec){
    var hs=document.getElementById('ic-hotel-'+rec.recordId);
    var rs=document.getElementById('ic-role-'+rec.recordId);
    var sb=document.getElementById('ic-save-'+rec.recordId);
    if(hs&&rec.hotel) hs.value=rec.hotel;
    if(rs&&rec.roleAssigned) rs.value=rec.roleAssigned;
    if(sb) sb.addEventListener('click',function(){doICSave(rec.recordId,this);});
  });
}
async function doICSave(rid,btn) {
  btn.disabled=true;btn.textContent='Saving...';
  var hotel=document.getElementById('ic-hotel-'+rid)?document.getElementById('ic-hotel-'+rid).value:'';
  var roleAssigned=document.getElementById('ic-role-'+rid)?document.getElementById('ic-role-'+rid).value:'';
  try {
    await api('/assignments/'+rid,{method:'PATCH',body:JSON.stringify({hotel:hotel,roleAssigned:roleAssigned,location:currentSite})});
    var rec=assignments.find(function(a){return a.recordId===rid;});
    if(rec){rec.hotel=hotel;rec.roleAssigned=roleAssigned;}
    btn.innerHTML='Saved &#10003;';
    setTimeout(function(){btn.disabled=false;btn.innerHTML='Save Changes';},2000);
  } catch(e){showError('Save failed: '+e.message);btn.disabled=false;btn.textContent='Save Changes';}
}

// COORDINATION VIEW
function enterCoordView(btn) {
  coordMode=true;
  document.querySelectorAll('.site-tab').forEach(function(t){t.classList.remove('active');});
  btn.classList.add('active');
  document.getElementById('grid-wrapper').style.display='none';
  document.getElementById('summary-bar').style.display='none';
  document.getElementById('role-bar').style.display='none';
  document.getElementById('week-nav').style.display='none';
  document.getElementById('coord-filter-bar').classList.add('active');
  document.getElementById('coord-view').classList.add('active');
  renderCoordView();
}
function exitCoordView() {
  coordMode=false;
  document.getElementById('grid-wrapper').style.display='';
  document.getElementById('summary-bar').style.display='';
  document.getElementById('week-nav').style.display='';
  document.getElementById('coord-filter-bar').classList.remove('active');
  document.getElementById('coord-view').classList.remove('active');
  if (currentUser&&currentUser.role==='scheduler') document.getElementById('role-bar').style.display='';
}
function renderCoordView() {
  var siteFilter=document.getElementById('coord-site-filter')?document.getElementById('coord-site-filter').value:'';
  var statusFilter=document.getElementById('coord-status-filter')?document.getElementById('coord-status-filter').value:'confirmed';
  var editable=currentUser&&(currentUser.role==='scheduler'||currentUser.role==='coordinator');
  var filtered=assignments.filter(function(a){
    if (!a.roleAssigned) return false;
    if (siteFilter&&a.location!==siteFilter) return false;
    if (statusFilter==='confirmed'&&!a.confirmed) return false;
    return true;
  });
  var container=document.getElementById('coord-view');
  container.innerHTML='';
  if (filtered.length===0){container.innerHTML='<div class="empty-state" style="margin-top:60px">No assignments found</div>';return;}
  filtered.forEach(function(rec){
    var c=contractors.find(function(x){return x.recordId===rec.contractorRecordId;});
    if (!c) return;
    var card=document.createElement('div');
    card.className='coord-card'+(rec.confirmed?' confirmed':'');
    var shiftCls=rec.shift==='Day'?'day':'night';
    card.innerHTML=
      '<div class="coord-card-header">'+
      '<div class="avatar">'+c.initials+'</div>'+
      '<div><div class="coord-card-name">'+c.name+'</div>'+
      '<div class="coord-card-meta">'+
      '<span>'+rec.roleAssigned+'</span>'+
      '<span class="shift-badge '+shiftCls+'">'+rec.shift+'</span>'+
      (rec.location?'<span class="site-badge">'+rec.location+'</span>':'')+
      (rec.confirmed?'<span class="confirmed-badge">CONFIRMED</span>':'<span class="draft-badge">DRAFT</span>')+
      '<span>'+fmtDate(rec.startDate)+' &rarr; '+fmtDate(rec.endDate)+'</span>'+
      (c.phone?'<a href="tel:'+c.phone+'" style="color:var(--green)">'+c.phone+'</a>':'')+
      (c.address?'<span>&#128205; '+c.address+'</span>':'')+
      '</div></div></div>';
    if (editable){
      var fields=document.createElement('div');
      fields.className='coord-fields';
      fields.innerHTML=
        '<div class="coord-field"><label>Travel Required</label>'+
        '<div class="coord-check"><input type="checkbox" id="tr-req-'+rec.recordId+'"'+(rec.travelRequired?' checked':'')+'>'+
        '<span style="font-size:12px;color:var(--text-dim)">Yes</span></div></div>'+
        '<div class="coord-field"><label>Travel Booked</label>'+
        '<div class="coord-check"><input type="checkbox" id="tr-bkd-'+rec.recordId+'"'+(rec.travelBooked?' checked':'')+'>'+
        '<span style="font-size:12px;color:var(--text-dim)">Yes</span></div></div>'+
        '<div class="coord-field"><label>Arrival Date</label>'+
        '<input type="date" id="tr-arr-'+rec.recordId+'" value="'+(rec.travelArrival||'')+'"></div>'+
        '<div class="coord-field"><label>Departure Date</label>'+
        '<input type="date" id="tr-dep-'+rec.recordId+'" value="'+(rec.travelDeparture||'')+'"></div>'+
        '<div class="coord-field full"><label>Booking Reference</label>'+
        '<input type="text" id="tr-ref-'+rec.recordId+'" value="'+(rec.bookingReference||'')+'" placeholder="Flight / train / hotel ref"></div>'+
        '<div class="coord-field full"><label>Travel Notes</label>'+
        '<input type="text" id="tr-nts-'+rec.recordId+'" value="'+(rec.travelNotes||'')+'" placeholder="Additional notes"></div>';
      card.appendChild(fields);
      var btn=document.createElement('button');
      btn.className='btn btn-green';btn.textContent='Save Travel';
      btn.dataset.rid=rec.recordId;
      btn.addEventListener('click',function(){doSaveTravel(this.dataset.rid,this);});
      card.appendChild(btn);
    } else {
      var ro=document.createElement('div');
      ro.className='coord-fields';
      ro.innerHTML=
        '<div class="coord-field"><label>Travel Required</label><div>'+(rec.travelRequired?'Yes':'No')+'</div></div>'+
        '<div class="coord-field"><label>Travel Booked</label><div>'+(rec.travelBooked?'Yes':'No')+'</div></div>'+
        '<div class="coord-field"><label>Arrival</label><div>'+(rec.travelArrival||'-')+'</div></div>'+
        '<div class="coord-field"><label>Departure</label><div>'+(rec.travelDeparture||'-')+'</div></div>'+
        (rec.bookingReference?'<div class="coord-field full"><label>Booking Ref</label><div>'+rec.bookingReference+'</div></div>':'')+
        (rec.travelNotes?'<div class="coord-field full"><label>Notes</label><div>'+rec.travelNotes+'</div></div>':'');
      card.appendChild(ro);
    }
    container.appendChild(card);
  });
}
async function doSaveTravel(rid,btn) {
  btn.disabled=true;btn.textContent='...';
  var get=function(id){var el=document.getElementById(id);return el?el.value:'';};
  var chk=function(id){var el=document.getElementById(id);return el?el.checked:false;};
  var payload={
    travelRequired:chk('tr-req-'+rid),travelBooked:chk('tr-bkd-'+rid),
    travelArrival:get('tr-arr-'+rid),travelDeparture:get('tr-dep-'+rid),
    bookingReference:get('tr-ref-'+rid),travelNotes:get('tr-nts-'+rid),
    location:currentSite
  };
  try {
    await api('/assignments/'+rid,{method:'PATCH',body:JSON.stringify(payload)});
    var rec=assignments.find(function(a){return a.recordId===rid;});
    if(rec) Object.assign(rec,payload);
    btn.innerHTML='Saved &#10003;';
    setTimeout(function(){btn.disabled=false;btn.innerHTML='Save Travel';},2000);
  } catch(e){showError('Save failed: '+e.message);btn.disabled=false;btn.textContent='Save Travel';}
}

function setSite(site,btn) {
  if (coordMode) exitCoordView();
  currentSite=site;
  document.querySelectorAll('.site-tab').forEach(function(t){t.classList.remove('active');});
  btn.classList.add('active');
  loadData();
}
function shiftWeek(delta){weekOffset+=delta;loadData();}

init();
</script>
